<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="瀧飲山潮">
<title>瀧飲山潮 · 學士店</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,#0A5C42 0%,#0A7C52 60%,#0D9E6A 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{font-size:40px;margin-bottom:8px}
.title{color:#fff;font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px;text-align:center}
.sub{color:rgba(255,255,255,.7);font-size:14px;margin-bottom:36px;text-align:center}
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px}
.card{background:#fff;border-radius:16px;padding:20px 22px;display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;box-shadow:0 4px 20px rgba(0,0,0,.15);transition:transform .12s,box-shadow .12s}
.card:active{transform:scale(.97);box-shadow:0 2px 10px rgba(0,0,0,.15)}
.card-icon{font-size:32px;flex-shrink:0;width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.ic-temp{background:#E0F5EE}
.ic-jelly{background:#E8F5EE}
.ic-stock{background:#E8F0FA}
.ic-elec{background:#FFF0D0}
.ic-check{background:#E8F5EE}
.card-info{flex:1}
.card-title{font-size:17px;font-weight:700;color:#111;margin-bottom:3px}
.card-desc{font-size:12px;color:#888}
.arrow{color:#ccc;font-size:18px}
.footer{margin-top:28px;color:rgba(255,255,255,.5);font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="logo">🌊</div>
<div class="title">瀧飲山潮</div>
<div class="sub">學士店 · 作業系統</div>

<div class="cards">
  <a href="temp.html" class="card">
    <div class="card-icon ic-temp">🌡️</div>
    <div class="card-info">
      <div class="card-title">溫度記錄</div>
      <div class="card-desc">前冰仙凍溫度 · 每日三時段</div>
    </div>
    <div class="arrow">›</div>
  </a>
  <a href="jelly.html" class="card">
    <div class="card-icon ic-jelly">🌿</div>
    <div class="card-info">
      <div class="card-title">仙草凍記錄</div>
      <div class="card-desc">煮好 → 下層 → 上層 → 臥式 → 清洗</div>
    </div>
    <div class="arrow">›</div>
  </a>
  <a href="stock.html" class="card">
    <div class="card-icon ic-stock">📦</div>
    <div class="card-info">
      <div class="card-title">進貨盤點</div>
      <div class="card-desc">進貨記錄 · 統整表</div>
    </div>
    <div class="arrow">›</div>
  </a>
  <a href="elec.html" class="card">
    <div class="card-icon ic-elec">⚡</div>
    <div class="card-info">
      <div class="card-title">電表記錄</div>
      <div class="card-desc">每日用電 · 月統計 · 特殊備注</div>
    </div>
    <div class="arrow">›</div>
  </a>
  <a href="checklist.html" class="card">
    <div class="card-icon ic-check">✅</div>
    <div class="card-info">
      <div class="card-title">開班 Checklist</div>
      <div class="card-desc">開班流程確認 · 記錄 · 歷史查詢</div>
    </div>
    <div class="arrow">›</div>
  </a>
</div>

<div class="footer">資料同步至 Google Sheets</div>
</body>
</html>
