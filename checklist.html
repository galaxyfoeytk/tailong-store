<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="開收班記錄">
<title>開收班 Checklist</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
:root{
  --b:#1A3A5C;--bl:#E8F0FA;--bm:#4A7CB5;
  --g:#1A6B3C;--gl:#E8F5EE;--gm:#3DA86A;
  --amber:#8A5500;--amberl:#FFF8E6;
  --red:#C0302A;--redl:#FDECEA;
  --purple:#5B2D8E;--purplel:#F3E8FF;
  --ink:#0F1923;--ink2:#3A4A5C;--ink3:#7A8A9C;--ink4:#C8D4DF;
  --bg:#EFF2F7;--white:#fff;--bd:#D4DCE8;
  --r:14px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

.topbar{background:linear-gradient(135deg,#142E4A,#1E4A78);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand-name{color:#fff;font-size:16px;font-weight:900}
.brand-sub{color:rgba(255,255,255,.6);font-size:11px;margin-top:1px}
.top-btns{display:flex;gap:6px}
.tib{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:13px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;font-family:inherit;white-space:nowrap}
.tib:active{background:rgba(255,255,255,.3)}

.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--bd);flex-shrink:0}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;color:var(--ink3);border:none;background:transparent;font-family:inherit;border-bottom:2.5px solid transparent}
.tab.on{color:var(--b);font-weight:700;border-bottom-color:var(--b)}

.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;display:none;padding:12px 12px 32px}
.page.on{display:block}

/* 主選單 */
.mode-cards{display:flex;flex-direction:column;gap:12px;margin-top:4px}
.mode-card{background:var(--white);border-radius:16px;padding:20px;display:flex;align-items:center;gap:16px;cursor:pointer;border:2px solid var(--bd);transition:all .12s}
.mode-card:active{transform:scale(.98)}
.mode-card.open{border-color:var(--bm)}
.mode-card.close{border-color:var(--purple)}
.mode-icon{font-size:34px;flex-shrink:0;width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.mc-open{background:#E8F0FA}
.mc-close{background:#F3E8FF}
.mode-name{font-size:17px;font-weight:900;margin-bottom:4px}
.mode-desc{font-size:12px;color:var(--ink3)}
.open-clr{color:var(--b)}
.close-clr{color:var(--purple)}

/* 資訊卡 */
.info-card{border-radius:var(--r);padding:16px;margin-bottom:12px;color:#fff}
.info-card.open-card{background:linear-gradient(135deg,var(--b),var(--bm))}
.info-card.close-card{background:linear-gradient(135deg,#5B2D8E,#8B5DBE)}
.info-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.info-row:last-child{margin-bottom:0}
.info-lbl{font-size:11px;opacity:.7;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.info-val{font-size:15px;font-weight:700}
.info-time{font-size:28px;font-weight:900;letter-spacing:-.5px}

/* 進度條 */
.progress-wrap{background:var(--white);border-radius:var(--r);padding:14px;margin-bottom:12px;border:1px solid var(--bd)}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-title{font-size:12px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase}
.progress-pct{font-size:18px;font-weight:900;color:var(--b)}
.progress-bar-bg{height:8px;background:var(--bd);border-radius:4px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--bm),var(--gm));border-radius:4px;transition:width .3s}
.progress-bar-fill.done{background:linear-gradient(90deg,var(--g),var(--gm))}

/* Checklist */
.section-label{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 6px;padding-left:2px}
.check-item{background:var(--white);border-radius:var(--r2);border:1.5px solid var(--bd);margin-bottom:6px;overflow:hidden;transition:border-color .15s,background .15s}
.check-item.done{background:var(--gl);border-color:var(--gm)}
.check-item.warn{background:var(--amberl);border-color:#E8C060}
.ci-main{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
.ci-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--bd);background:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-item.done .ci-check{background:var(--g);border-color:var(--g);color:#fff;font-size:13px}
.check-item.warn .ci-check{background:var(--amber);border-color:var(--amber);color:#fff;font-size:13px}
.ci-content{flex:1}
.ci-step{font-size:10px;font-weight:700;color:var(--ink3);margin-bottom:2px;letter-spacing:.04em}
.ci-name{font-size:14px;font-weight:600;color:var(--ink)}
.check-item.done .ci-name{color:var(--g)}
.ci-desc{font-size:12px;color:var(--ink3);margin-top:3px}
.ci-time{font-size:11px;color:var(--gm);font-weight:600;margin-top:4px}
.check-item.warn .ci-time{color:var(--amber)}
.ci-note-btn{padding:4px 10px;border:1px solid var(--bd);border-radius:6px;background:var(--white);font-size:11px;color:var(--ink3);cursor:pointer;font-family:inherit;flex-shrink:0}
.ci-note-btn:active{background:var(--bl)}
.ci-note-area{padding:0 14px 12px;display:none}
.ci-note-input{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:13px;font-family:inherit;background:var(--white);color:var(--ink);outline:none;resize:none;height:60px}
.ci-note-input:focus{border-color:var(--bm)}

/* 完成 */
.done-banner{border-radius:var(--r);padding:18px;text-align:center;margin-bottom:12px;color:#fff}
.done-banner-icon{font-size:36px;margin-bottom:6px}
.done-banner-title{font-size:18px;font-weight:900;margin-bottom:4px}
.done-banner-sub{font-size:13px;opacity:.8}

/* 歷史 */
.hist-card{background:var(--white);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:10px;overflow:hidden}
.hc-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.hc-date{font-size:15px;font-weight:700}
.hc-badge{padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700}
.hc-open{background:var(--bl);color:var(--b)}
.hc-close{background:var(--purplel);color:var(--purple)}
.hc-body{padding:10px 14px}
.hc-meta{font-size:12px;color:var(--ink3);margin-bottom:8px}
.hc-steps{display:flex;flex-wrap:wrap;gap:5px}
.hc-step{font-size:11px;padding:3px 8px;border-radius:6px}
.hc-step.ok{background:var(--gl);color:var(--g)}
.hc-step.skip{background:var(--redl);color:var(--red)}
.hc-step.warn{background:var(--amberl);color:var(--amber)}

/* 設定 */
.blk{background:var(--white);border-radius:var(--r);border:1px solid var(--bd);padding:14px;margin-bottom:10px}
.blk-title{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.mgmt-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-radius:var(--r2);border:1px solid var(--bd);margin-bottom:6px}
.mgmt-info{flex:1}
.mgmt-name{font-size:14px;font-weight:600}
.mgmt-desc{font-size:11px;color:var(--ink3);margin-top:2px}
.mgmt-cat{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--bl);color:var(--b);font-weight:700;flex-shrink:0}
.mgmt-del{padding:5px 10px;border:1px solid #F5A0A0;border-radius:6px;background:var(--redl);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}
.add-inp{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:14px;font-family:inherit;background:var(--white);color:var(--ink);outline:none;margin-bottom:8px}
.add-inp:focus{border-color:var(--bm)}
.add-row{display:flex;gap:7px}
.add-btn{padding:10px 14px;background:var(--b);color:#fff;border:none;border-radius:var(--r2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.add-btn:active{opacity:.8}
.person-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.p-btn{padding:12px 6px;border-radius:var(--r2);border:1.5px solid var(--bd);background:var(--white);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink2);text-align:center}
.p-btn.on{background:var(--b);color:#fff;border-color:var(--b)}
.p-btn:active{opacity:.7}
.tab-toggle{display:flex;gap:6px;margin-bottom:12px}
.tab-toggle button{flex:1;padding:9px;border-radius:var(--r2);border:2px solid var(--bd);background:var(--white);color:var(--ink2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.tab-toggle button.on-open{background:var(--b);color:#fff;border-color:var(--b)}
.tab-toggle button.on-close{background:var(--purple);color:#fff;border-color:var(--purple)}

.save-btn{width:100%;padding:14px;color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.save-open{background:linear-gradient(135deg,var(--b),var(--bm))}
.save-close{background:linear-gradient(135deg,#5B2D8E,#8B5DBE)}

.empty{text-align:center;color:var(--ink3);padding:28px;font-size:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0F1923;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:500;display:none;pointer-events:none;white-space:nowrap;font-weight:500}

/* overlay */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.sh{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:90dvh;overflow-y:auto;padding:16px 14px 32px}
.sh-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 12px}
.sh-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.sh-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink3);line-height:1}
.sec-lbl{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;margin-top:14px}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="brand-name">✅ 開收班 Checklist</div>
    <div class="brand-sub">瀧飲山潮 · 學士店</div>
  </div>
  <div class="top-btns">
    <button class="tib" onclick="openMgmt()">⚙️ 設定</button>
    <button class="tib" onclick="location.href='index.html'">🏠</button>
  </div>
</div>

<div class="tabs">
  <button class="tab on" id="tab-check" onclick="showTab('check')">✅ Checklist</button>
  <button class="tab" id="tab-hist" onclick="showTab('hist')">📋 歷史記錄</button>
</div>

<div class="pages">

<!-- Checklist 主流程 -->
<div class="page on" id="page-check">

  <!-- 選開班/收班 -->
  <div id="mode-section">
    <div style="padding:8px 0 14px;font-size:15px;font-weight:700;color:var(--ink2)">請選擇班別類型</div>
    <div class="mode-cards">
      <div class="mode-card open" onclick="showSetup('open')">
        <div class="mode-icon mc-open">☀️</div>
        <div class="mode-info">
          <div class="mode-name open-clr">開班 Checklist</div>
          <div class="mode-desc">開店流程確認 · 設備/食材/環境</div>
        </div>
      </div>
      <div class="mode-card close" onclick="showSetup('close')">
        <div class="mode-icon mc-close">🌙</div>
        <div class="mode-info">
          <div class="mode-name close-clr">收班 Checklist</div>
          <div class="mode-desc">收店流程確認 · 清潔/關機/結帳</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 設定頁 -->
  <div id="start-section" style="display:none">
    <div class="blk" id="setup-type-badge" style="margin-bottom:10px;padding:12px 14px;display:flex;align-items:center;gap:10px">
      <span style="font-size:24px" id="setup-icon"></span>
      <div>
        <div style="font-size:16px;font-weight:900" id="setup-type-label"></div>
        <div style="font-size:12px;color:var(--ink3)">選擇人員與日期後開始</div>
      </div>
      <button onclick="backToMode()" style="margin-left:auto;padding:5px 10px;border:1px solid var(--bd);border-radius:8px;background:var(--white);color:var(--ink3);font-size:12px;cursor:pointer;font-family:inherit">← 返回</button>
    </div>
    <div class="blk">
      <div class="sec-lbl" style="margin-top:0">日期</div>
      <input type="date" id="cl-date" class="add-inp" style="margin-bottom:0">
      <div class="sec-lbl">人員</div>
      <div class="person-grid" id="person-grid-check"></div>
      <div class="sec-lbl">班別</div>
      <div style="display:flex;gap:7px;margin-bottom:4px" id="shift-btns"></div>
    </div>
    <button class="save-btn" id="start-btn" onclick="startChecklist()">▶ 開始</button>
  </div>

  <!-- 進行中 -->
  <div id="check-section" style="display:none">
    <div class="info-card" id="info-card">
      <div class="info-row">
        <div><div class="info-lbl">日期</div><div class="info-val" id="ic-date"></div></div>
        <div style="text-align:right"><div class="info-lbl">班別</div><div class="info-val" id="ic-shift"></div></div>
      </div>
      <div class="info-row">
        <div><div class="info-lbl">人員</div><div class="info-val" id="ic-person"></div></div>
        <div style="text-align:right"><div class="info-lbl">開始時間</div><div class="info-time" id="ic-time"></div></div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-title">完成進度</span>
        <span class="progress-pct" id="prog-pct">0%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
    </div>
    <div id="checklist-body"></div>
    <button class="save-btn" id="finish-btn" onclick="finishChecklist()" style="margin-top:4px;opacity:.4" disabled></button>
  </div>

  <!-- 完成 -->
  <div id="done-section" style="display:none">
    <div class="done-banner" id="done-banner">
      <div class="done-banner-icon" id="done-icon"></div>
      <div class="done-banner-title" id="done-title"></div>
      <div class="done-banner-sub" id="done-sub"></div>
    </div>
    <div id="done-summary"></div>
    <button class="save-btn save-open" onclick="resetChecklist()">➕ 開始新的記錄</button>
  </div>

</div><!-- /page-check -->

<!-- 歷史記錄 -->
<div class="page" id="page-hist">
  <div id="hist-content"></div>
</div>

</div><!-- /pages -->

<!-- 設定 overlay -->
<div class="ov" id="ov-mgmt">
  <div class="sh">
    <div class="sh-handle"></div>
    <div class="sh-title">設定管理 <button class="sh-close" onclick="closeMgmt()">✕</button></div>

    <!-- 開班/收班 切換 -->
    <div class="tab-toggle" id="mgmt-tabs">
      <button id="mt-open" onclick="switchMgmtTab('open')" class="on-open">☀️ 開班步驟</button>
      <button id="mt-close" onclick="switchMgmtTab('close')">🌙 收班步驟</button>
    </div>

    <!-- 人員管理 -->
    <div class="blk-title" style="margin-top:4px">👤 人員管理</div>
    <div id="ml-person"></div>
    <div class="add-row">
      <input class="add-inp" id="ai-person" placeholder="新增人員姓名" style="margin-bottom:0;flex:1">
      <button class="add-btn" onclick="addPerson()">新增</button>
    </div>

    <!-- 步驟管理 -->
    <div class="blk-title" style="margin-top:18px">📋 步驟管理 <span id="mgmt-step-label" style="font-size:11px;font-weight:400;color:var(--ink3)">（開班）</span></div>
    <div id="ml-steps"></div>
    <div style="margin-top:8px">
      <input class="add-inp" id="ai-step-name" placeholder="步驟名稱（如：關閉所有設備）">
      <input class="add-inp" id="ai-step-desc" placeholder="說明（選填）">
      <div style="display:flex;gap:7px;margin-bottom:8px">
        <select id="ai-step-cat" style="flex:1;padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:14px;font-family:inherit;background:var(--white);color:var(--ink);outline:none">
          <option>開店準備</option><option>設備確認</option><option>食材確認</option>
          <option>清潔衛生</option><option>收店流程</option><option>結帳確認</option><option>其他</option>
        </select>
        <div style="display:flex;align-items:center;gap:6px;padding:0 8px;border:1.5px solid var(--bd);border-radius:var(--r2);background:var(--white)">
          <span style="font-size:12px;color:var(--ink3)">必填</span>
          <input type="checkbox" id="ai-step-req" style="width:16px;height:16px;cursor:pointer">
        </div>
      </div>
      <button class="save-btn save-open" id="add-step-btn" onclick="addStep()">新增步驟</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════
// 預設資料
// ══════════════════════════════
var DEFAULT_PERSONS=['榮富','冠銘','柏廷','鈞凱','家暉','宥霖','冠文'];

var DEFAULT_OPEN_STEPS=[
  {id:1,name:'確認前一天記帳是否完成',desc:'',cat:'開店準備',req:true},
  {id:2,name:'開啟所有冷藏冷凍設備',desc:'確認電源正常，溫度顯示正確',cat:'設備確認',req:true},
  {id:3,name:'確認仙草凍製作進度',desc:'查看昨日是否有需移動的桶子',cat:'設備確認',req:true},
  {id:4,name:'確認食材庫存',desc:'查看冷藏、冷凍、常溫食材是否充足',cat:'食材確認',req:true},
  {id:5,name:'清潔工作台及設備',desc:'用食品級清潔劑擦拭',cat:'清潔衛生',req:true},
  {id:6,name:'確認飲料機/茶桶設備',desc:'確認出水正常、溫度正確',cat:'設備確認',req:true},
  {id:7,name:'確認收銀機/POS系統',desc:'確認可正常結帳，零錢準備充足',cat:'開店準備',req:true},
  {id:8,name:'補充外帶杯、封膜、吸管',desc:'確認數量足夠',cat:'食材確認',req:false},
  {id:9,name:'確認店內環境整潔',desc:'地板、桌椅、門窗清潔',cat:'清潔衛生',req:false},
  {id:10,name:'翻開營業招牌/開燈',desc:'確認店面正常開業狀態',cat:'開店準備',req:true},
];

var DEFAULT_CLOSE_STEPS=[
  {id:101,name:'結帳並確認金額正確',desc:'核對現金與系統金額',cat:'結帳確認',req:true},
  {id:102,name:'完成當日記帳',desc:'填寫營業額、支出等',cat:'結帳確認',req:true},
  {id:103,name:'清潔飲料機/茶桶',desc:'清洗出水口，清空殘料',cat:'清潔衛生',req:true},
  {id:104,name:'清潔工作台及地板',desc:'清掃、拖地',cat:'清潔衛生',req:true},
  {id:105,name:'整理食材並確認保存',desc:'冷藏/冷凍食材確認密封保存',cat:'食材確認',req:true},
  {id:106,name:'確認仙草凍移動進度',desc:'確認是否有需移動的桶子',cat:'設備確認',req:true},
  {id:107,name:'關閉非必要設備電源',desc:'燈具、飲料機、顯示器等',cat:'收店流程',req:true},
  {id:108,name:'倒垃圾',desc:'清空垃圾桶並更換垃圾袋',cat:'清潔衛生',req:false},
  {id:109,name:'確認門窗鎖好',desc:'所有出入口確認上鎖',cat:'收店流程',req:true},
  {id:110,name:'關閉招牌/店燈',desc:'確認店面關閉狀態',cat:'收店流程',req:true},
];

var persons, openSteps, closeSteps, history;
var checkType = 'open'; // 'open' | 'close'
var mgmtType = 'open';

function loadData(){
  try{
    var raw=localStorage.getItem('checklist_v2');if(!raw)throw 0;
    var d=JSON.parse(raw);
    persons=d.persons;
    openSteps=d.openSteps;
    closeSteps=d.closeSteps;
    history=d.history||[];
  }catch(e){
    persons=DEFAULT_PERSONS.slice();
    openSteps=JSON.parse(JSON.stringify(DEFAULT_OPEN_STEPS));
    closeSteps=JSON.parse(JSON.stringify(DEFAULT_CLOSE_STEPS));
    history=[];
  }
}
function saveData(){
  try{localStorage.setItem('checklist_v2',JSON.stringify({persons,openSteps,closeSteps,history}));}catch(e){}
}

// ══════════════════════════════
// 狀態
// ══════════════════════════════
var selPerson='', selShift='早班';
var session=null;

window.onload=function(){
  loadData();
  document.getElementById('cl-date').value=todayStr();
  buildPersonGrid();
  buildShiftBtns();
};

// ══════════════════════════════
// 模式選擇
// ══════════════════════════════
function showSetup(type){
  checkType=type;
  var isOpen=type==='open';
  document.getElementById('mode-section').style.display='none';
  document.getElementById('start-section').style.display='block';
  document.getElementById('setup-icon').textContent=isOpen?'☀️':'🌙';
  document.getElementById('setup-type-label').textContent=isOpen?'開班 Checklist':'收班 Checklist';
  document.getElementById('start-btn').className='save-btn '+(isOpen?'save-open':'save-close');
  document.getElementById('start-btn').textContent='▶ 開始'+(isOpen?'開班':'收班');
  // 調整班別選項
  selShift=isOpen?'早班':'晚班';
  buildShiftBtns();
  buildPersonGrid();
}
function backToMode(){
  document.getElementById('start-section').style.display='none';
  document.getElementById('mode-section').style.display='block';
  selPerson='';
  buildPersonGrid();
}

// ══════════════════════════════
// 開始 / 完成 / 重設
// ══════════════════════════════
function startChecklist(){
  if(!selPerson){showToast('請選擇人員');return;}
  var date=document.getElementById('cl-date').value;
  if(!date){showToast('請選擇日期');return;}
  var steps=checkType==='open'?openSteps:closeSteps;
  session={
    type:checkType,
    date:date, person:selPerson, shift:selShift,
    startTime:nowStr(),
    items:steps.map(function(s){return{id:s.id,name:s.name,desc:s.desc,cat:s.cat,req:s.req,done:false,warn:false,time:'',note:''};})
  };
  var isOpen=checkType==='open';
  document.getElementById('info-card').className='info-card '+(isOpen?'open-card':'close-card');
  document.getElementById('ic-date').textContent=fmtDate(date);
  document.getElementById('ic-shift').textContent=selShift;
  document.getElementById('ic-person').textContent=selPerson;
  document.getElementById('ic-time').textContent=session.startTime.slice(11,16);
  var finBtn=document.getElementById('finish-btn');
  finBtn.textContent='✓ 完成'+(isOpen?'開班':'收班')+'並儲存';
  finBtn.className='save-btn '+(isOpen?'save-open':'save-close');
  document.getElementById('start-section').style.display='none';
  document.getElementById('check-section').style.display='block';
  renderChecklist();
}

function finishChecklist(){
  if(!session) return;
  session.endTime=nowStr();
  var total=session.items.length;
  var done=session.items.filter(function(i){return i.done;}).length;
  var warns=session.items.filter(function(i){return i.warn;}).length;
  session.total=total; session.done=done; session.warns=warns;
  history.unshift(JSON.parse(JSON.stringify(session)));
  saveData();
  var isOpen=session.type==='open';
  document.getElementById('check-section').style.display='none';
  document.getElementById('done-section').style.display='block';
  var banner=document.getElementById('done-banner');
  banner.style.background=isOpen?'linear-gradient(135deg,#1A6B3C,#3DA86A)':'linear-gradient(135deg,#5B2D8E,#8B5DBE)';
  document.getElementById('done-icon').textContent=isOpen?'🎉':'🌙';
  document.getElementById('done-title').textContent=isOpen?'開班完成！':'收班完成！';
  document.getElementById('done-sub').textContent=selPerson+' · '+selShift+' · '+done+'/'+total+' 項完成'+(warns>0?' · '+warns+'項需注意':'');
  renderDoneSummary();
}

function resetChecklist(){
  session=null; selPerson=''; selShift='早班';
  document.getElementById('done-section').style.display='none';
  document.getElementById('check-section').style.display='none';
  document.getElementById('start-section').style.display='none';
  document.getElementById('mode-section').style.display='block';
  document.getElementById('cl-date').value=todayStr();
  buildPersonGrid(); buildShiftBtns();
}

// ══════════════════════════════
// 渲染 Checklist
// ══════════════════════════════
function renderChecklist(){
  if(!session) return;
  var cats=[...new Set(session.items.map(function(i){return i.cat;}))];
  var html='';
  cats.forEach(function(cat){
    html+='<div class="section-label">'+catIcon(cat)+' '+cat+'</div>';
    session.items.filter(function(i){return i.cat===cat;}).forEach(function(item){
      var globalIdx=session.items.findIndex(function(x){return x.id===item.id;});
      var cls=item.warn?'warn':item.done?'done':'';
      html+='<div class="check-item '+cls+'" id="ci-'+item.id+'">'
        +'<div class="ci-main" onclick="toggleItem('+item.id+')">'
          +'<div class="ci-check">'+(item.done||item.warn?'✓':'')+'</div>'
          +'<div class="ci-content">'
            +'<div class="ci-step">步驟 '+(globalIdx+1)+(item.req?' <span style="color:var(--red)">必填</span>':'')+'</div>'
            +'<div class="ci-name">'+item.name+'</div>'
            +(item.desc?'<div class="ci-desc">'+item.desc+'</div>':'')
            +(item.time?'<div class="ci-time">✓ '+item.time.slice(11,16)+' 完成</div>':'')
          +'</div>'
          +'<button class="ci-note-btn" onclick="event.stopPropagation();toggleNote('+item.id+')">'+(item.note?'📝':'備注')+'</button>'
        +'</div>'
        +'<div class="ci-note-area" id="note-'+item.id+'">'
          +'<textarea class="ci-note-input" id="note-inp-'+item.id+'" placeholder="備注說明..." oninput="saveNote('+item.id+',this.value)">'+item.note+'</textarea>'
        +'</div>'
      +'</div>';
    });
  });
  document.getElementById('checklist-body').innerHTML=html;
  updateProgress();
}

function toggleItem(id){
  var item=session.items.find(function(x){return x.id===id;});
  if(!item) return;
  if(!item.done&&!item.warn){ item.done=true; item.warn=false; item.time=nowStr(); }
  else if(item.done){ item.done=false; item.warn=true; }
  else { item.done=false; item.warn=false; item.time=''; }
  renderChecklist();
}
function toggleNote(id){
  var el=document.getElementById('note-'+id);
  el.style.display=el.style.display==='block'?'none':'block';
  if(el.style.display==='block') document.getElementById('note-inp-'+id).focus();
}
function saveNote(id,val){ var item=session.items.find(function(x){return x.id===id;}); if(item) item.note=val; }
function updateProgress(){
  var total=session.items.length;
  var done=session.items.filter(function(i){return i.done||i.warn;}).length;
  var pct=total>0?Math.round(done/total*100):0;
  document.getElementById('prog-pct').textContent=pct+'%';
  var bar=document.getElementById('prog-bar');
  bar.style.width=pct+'%';
  bar.className='progress-bar-fill'+(pct===100?' done':'');
  var reqItems=session.items.filter(function(i){return i.req;});
  var reqDone=reqItems.every(function(i){return i.done||i.warn;});
  var btn=document.getElementById('finish-btn');
  btn.disabled=!reqDone;
  btn.style.opacity=reqDone?1:0.4;
}

function renderDoneSummary(){
  if(!session) return;
  var done=session.items.filter(function(i){return i.done;});
  var warn=session.items.filter(function(i){return i.warn;});
  var skip=session.items.filter(function(i){return !i.done&&!i.warn;});
  var html='<div class="blk" style="margin-top:0">';
  if(warn.length){
    html+='<div class="section-label">⚠️ 需注意</div>';
    warn.forEach(function(i){ html+='<div style="padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px;color:var(--amber)">'+i.name+(i.note?' — '+i.note:'')+'</div>'; });
  }
  if(skip.filter(function(i){return i.req;}).length){
    html+='<div class="section-label">❌ 未完成（必填）</div>';
    skip.filter(function(i){return i.req;}).forEach(function(i){ html+='<div style="padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px;color:var(--red)">'+i.name+'</div>'; });
  }
  html+='<div class="section-label" style="margin-top:8px">✅ 完成項目（'+done.length+'）</div>';
  done.forEach(function(i){ html+='<div style="padding:6px 0;font-size:13px;color:var(--g)">'+i.name+' <span style="color:var(--ink3);font-size:11px">'+i.time.slice(11,16)+'</span></div>'; });
  html+='</div>';
  document.getElementById('done-summary').innerHTML=html;
}

// ══════════════════════════════
// 歷史記錄
// ══════════════════════════════
function renderHist(){
  var el=document.getElementById('hist-content');
  if(!history.length){el.innerHTML='<div class="empty">尚無歷史記錄</div>';return;}
  el.innerHTML=history.map(function(h){
    var isOpen=h.type==='open';
    var isFull=h.done===h.total;
    return '<div class="hist-card">'
      +'<div class="hc-head">'
        +'<div><div class="hc-date">'+fmtDate(h.date)+' '+h.shift+'</div>'
          +'<div style="font-size:12px;color:var(--ink3)">'+h.person+' · '+h.startTime.slice(11,16)+' 開始</div></div>'
        +'<span class="hc-badge '+(isOpen?'hc-open':'hc-close')+'">'+(isOpen?'☀️ 開班':'🌙 收班')+'</span>'
      +'</div>'
      +'<div class="hc-body">'
        +'<div class="hc-meta">完成：'+h.endTime.slice(11,16)+' · '+h.done+'/'+h.total+'項'+(h.warns>0?' · <span style="color:var(--amber)">'+h.warns+'項注意</span>':'')+'</div>'
        +'<div class="hc-steps">'
        +h.items.map(function(i){
          var cls=i.warn?'warn':i.done?'ok':'skip';
          return '<span class="hc-step '+cls+'">'+(i.warn?'⚠️':i.done?'✓':'✗')+' '+i.name+'</span>';
        }).join('')
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
}

// ══════════════════════════════
// 頁籤
// ══════════════════════════════
function showTab(p){
  ['check','hist'].forEach(function(n){
    document.getElementById('page-'+n).className='page'+(n===p?' on':'');
    document.getElementById('tab-'+n).className='tab'+(n===p?' on':'');
  });
  if(p==='hist') renderHist();
}

// ══════════════════════════════
// 設定管理
// ══════════════════════════════
function openMgmt(){ buildPersonMgmt(); buildStepMgmt(); document.getElementById('ov-mgmt').classList.add('show'); }
function closeMgmt(){ document.getElementById('ov-mgmt').classList.remove('show'); }

function switchMgmtTab(type){
  mgmtType=type;
  var isOpen=type==='open';
  document.getElementById('mt-open').className=isOpen?'on-open':'';
  document.getElementById('mt-close').className=!isOpen?'on-close':'';
  document.getElementById('mgmt-step-label').textContent='（'+(isOpen?'開班':'收班')+'）';
  document.getElementById('add-step-btn').className='save-btn '+(isOpen?'save-open':'save-close');
  buildStepMgmt();
}

function buildPersonMgmt(){
  var el=document.getElementById('ml-person');
  el.innerHTML=persons.map(function(p,i){
    return '<div class="mgmt-row"><span class="mgmt-info"><span class="mgmt-name">'+p+'</span></span>'
      +'<button class="mgmt-del" onclick="delPerson('+i+')">刪除</button></div>';
  }).join('');
}
function addPerson(){
  var v=document.getElementById('ai-person').value.trim();
  if(!v){showToast('請輸入姓名');return;}
  if(persons.indexOf(v)!==-1){showToast('已存在');return;}
  persons.push(v); saveData(); buildPersonMgmt(); buildPersonGrid();
  document.getElementById('ai-person').value='';
  showToast('✓ 已新增：'+v);
}
function delPerson(i){ if(!confirm('確定刪除？'))return; persons.splice(i,1); saveData(); buildPersonMgmt(); buildPersonGrid(); }

function buildStepMgmt(){
  var steps=mgmtType==='open'?openSteps:closeSteps;
  var el=document.getElementById('ml-steps');
  el.innerHTML=steps.map(function(s,i){
    return '<div class="mgmt-row">'
      +'<div class="mgmt-info"><div class="mgmt-name">'+s.name+(s.req?' <span style="color:var(--red);font-size:10px">必填</span>':'')+'</div>'
        +(s.desc?'<div class="mgmt-desc">'+s.desc+'</div>':'')
      +'</div>'
      +'<span class="mgmt-cat">'+s.cat+'</span>'
      +'<button class="mgmt-del" onclick="delStep(\''+mgmtType+'\','+s.id+')">刪除</button>'
    +'</div>';
  }).join('');
}
function addStep(){
  var name=document.getElementById('ai-step-name').value.trim();
  if(!name){showToast('請輸入步驟名稱');return;}
  var desc=document.getElementById('ai-step-desc').value.trim();
  var cat=document.getElementById('ai-step-cat').value;
  var req=document.getElementById('ai-step-req').checked;
  var steps=mgmtType==='open'?openSteps:closeSteps;
  var newId=steps.length?Math.max.apply(null,steps.map(function(s){return s.id;}))+1:1;
  steps.push({id:newId,name:name,desc:desc,cat:cat,req:req});
  saveData(); buildStepMgmt();
  document.getElementById('ai-step-name').value='';
  document.getElementById('ai-step-desc').value='';
  document.getElementById('ai-step-req').checked=false;
  showToast('✓ 已新增步驟：'+name);
}
function delStep(type,id){
  if(!confirm('確定刪除？'))return;
  if(type==='open') openSteps=openSteps.filter(function(s){return s.id!==id;});
  else closeSteps=closeSteps.filter(function(s){return s.id!==id;});
  saveData(); buildStepMgmt();
}

// ══════════════════════════════
// 人員 & 班別
// ══════════════════════════════
function buildPersonGrid(){
  document.getElementById('person-grid-check').innerHTML=persons.map(function(p){
    return '<button class="p-btn'+(p===selPerson?' on':'')+'" onclick="pickPerson(\''+esc(p)+'\')">'+p+'</button>';
  }).join('');
}
function pickPerson(p){ selPerson=p; buildPersonGrid(); }
function buildShiftBtns(){
  var shifts=checkType==='open'
    ?[{id:'早班',icon:'☀️'},{id:'中班',icon:'🌤'},{id:'晚班',icon:'🌙'}]
    :[{id:'中班',icon:'🌤'},{id:'晚班',icon:'🌙'},{id:'假日班',icon:'🎉'}];
  document.getElementById('shift-btns').innerHTML=shifts.map(function(s){
    return '<button class="p-btn'+(s.id===selShift?' on':'')+'" onclick="pickShift(\''+s.id+'\')" style="flex:1">'+s.icon+' '+s.id+'</button>';
  }).join('');
}
function pickShift(s){ selShift=s; buildShiftBtns(); }

// ══════════════════════════════
// 工具
// ══════════════════════════════
function catIcon(cat){
  var m={'開店準備':'🏪','設備確認':'🔧','食材確認':'🥤','清潔衛生':'🧹',
         '收店流程':'🏠','結帳確認':'💰','其他':'📌'};
  return m[cat]||'📌';
}
function todayStr(){ var d=new Date(),p=function(n){return String(n).padStart(2,'0');}; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function fmtDate(d){ return d?d.slice(5).replace('-','/'):''; }
function nowStr(){ var d=new Date(),p=function(n){return String(n).padStart(2,'0');}; return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds()); }
function esc(s){ return String(s).replace(/'/g,"\\'"); }
function showToast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._t); t._t=setTimeout(function(){ t.style.display='none'; },2800); }
document.addEventListener('click',function(e){ var ov=document.getElementById('ov-mgmt'); if(e.target===ov) closeMgmt(); });
</script>
