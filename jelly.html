<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>仙草凍・茶製記錄</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
:root{
  --b:#1A3A5C;--bl:#E8F0FA;--bm:#4A7CB5;
  --g:#1A6B3C;--gl:#E8F5EE;--gm:#3DA86A;
  --amber:#E65100;--amberl:#FFF3E0;
  --red:#C62828;--redl:#FFEBEE;
  --purple:#5E35B1;--purplel:#EDE7F6;
  --ink:#1A1A2E;--ink2:#444;--ink3:#888;
  --bd:#E0E4EE;--bg:#F5F7FA;--white:#fff;
  --r:14px;--r2:10px;--r3:6px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;min-height:100dvh}

/* 頂部分頁 */
.tabs{display:flex;background:var(--b);padding:0 4px}
.tab-btn{flex:1;padding:14px 0;border:none;background:transparent;color:rgba(255,255,255,.55);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border-bottom:3px solid transparent;transition:.2s}
.tab-btn.on{color:#fff;border-bottom-color:var(--gm)}

.panel{display:none;padding:12px}
.panel.on{display:block}

/* 卡片 */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:10px;overflow:hidden}
.card-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.card-head-title{font-size:14px;font-weight:700}
.card-body{padding:12px 14px}

/* 表單 */
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.field select,.field input[type=time],.field input[type=text],.field input[type=date]{
  width:100%;padding:11px 12px;border:1.5px solid var(--bd);border-radius:var(--r2);
  font-size:15px;font-family:inherit;background:var(--white);color:var(--ink);outline:none}
.field select:focus,.field input:focus{border-color:var(--b)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* 按鈕 */
.btn{padding:12px;border:none;border-radius:var(--r2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
.btn-g{background:var(--g);color:#fff}
.btn-b{background:var(--b);color:#fff}
.btn-outline{background:var(--white);color:var(--ink2);border:1.5px solid var(--bd)}
.btn-sm{padding:7px 14px;font-size:12px;width:auto;border-radius:var(--r3)}
.btn-red{background:var(--redl);color:var(--red);border:none}

/* 進行中記錄 */
.active-card{background:var(--white);border-radius:var(--r2);border:1.5px solid var(--bd);margin-bottom:8px;overflow:hidden}
.active-head{padding:10px 14px;display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,var(--bl),transparent)}
.active-item{font-size:14px;font-weight:900;color:var(--b)}
.active-barrel{padding:3px 10px;background:var(--b);color:#fff;border-radius:10px;font-size:12px;font-weight:700}
.stage-row{display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--bd);flex-wrap:wrap;align-items:center}
.stage-lbl{font-size:11px;color:var(--ink3);min-width:44px;font-weight:600}
.stage-time{font-size:13px;font-weight:700;color:var(--b)}
.stage-empty{font-size:12px;color:var(--bd)}
.stage-badge{padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700}
.stage-done{background:var(--gl);color:var(--g)}
.stage-cur{background:var(--amberl);color:var(--amber)}
.action-row{padding:8px 14px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--bd)}

/* 茶製記錄 */
.tea-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r2);border:1.5px solid var(--bd);margin-bottom:6px;background:var(--white)}
.tea-card.washed{background:var(--gl);border-color:var(--gm)}
.tea-info{flex:1;min-width:0}
.tea-name{font-size:14px;font-weight:700}
.tea-time{font-size:12px;color:var(--ink3);margin-top:2px}
.tea-duration{font-size:12px;font-weight:700;color:var(--g);margin-top:2px}

/* 歷史 */
.log-card{padding:10px 14px;border-bottom:1px solid var(--bd)}
.log-card:last-child{border-bottom:none}
.log-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.log-item{font-size:13px;font-weight:700}
.log-date{font-size:11px;color:var(--ink3)}
.log-stages{display:flex;gap:8px;flex-wrap:wrap}
.log-stage{font-size:12px;color:var(--ink2)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

.empty{text-align:center;padding:30px;color:var(--ink3);font-size:13px}
.section-title{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin:12px 0 8px}
</style>
</head>
<body>

<!-- 分頁切換 -->
<div class="tabs">
  <button class="tab-btn on" onclick="switchTab('jelly')">🌿 仙草凍記錄</button>
  <button class="tab-btn" onclick="switchTab('tea')">🍵 茶製記錄</button>
</div>

<!-- ═══ 仙草凍記錄 ═══ -->
<div class="panel on" id="panel-jelly">

  <!-- 新增進行中 -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-title">🌿 新增仙草凍</div>
      <button class="btn btn-outline btn-sm" onclick="loadActives()">🔄 重新載入</button>
    </div>
    <div class="card-body">
      <div class="grid3">
        <div class="field">
          <label>品項</label>
          <select id="j-item">
            <option value="仙草凍">仙草凍</option>
            <option value="青草凍">青草凍</option>
            <option value="芋頭凍">芋頭凍</option>
          </select>
        </div>
        <div class="field">
          <label>桶號</label>
          <select id="j-barrel">
            <option>1號桶</option><option>2號桶</option><option>3號桶</option>
            <option>4號桶</option><option>5號桶</option>
          </select>
        </div>
        <div class="field">
          <label>重量(g)</label>
          <input type="text" id="j-weight" placeholder="選填">
        </div>
      </div>
      <button class="btn btn-g" onclick="jellyAddNew()">＋ 開始記錄（煮好時間）</button>
    </div>
  </div>

  <!-- 進行中 -->
  <div class="section-title">進行中</div>
  <div id="actives-list"><div class="empty">載入中...</div></div>

  <!-- 歷史 -->
  <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
    <span>完成記錄</span>
    <select id="j-log-item" onchange="loadLogs()" style="font-size:12px;padding:4px 8px;border:1px solid var(--bd);border-radius:6px;font-family:inherit">
      <option value="">全部品項</option>
      <option value="仙草凍">仙草凍</option>
      <option value="青草凍">青草凍</option>
      <option value="芋頭凍">芋頭凍</option>
    </select>
  </div>
  <div class="card">
    <div id="logs-list"><div class="empty">載入中...</div></div>
  </div>
</div>

<!-- ═══ 茶製記錄 ═══ -->
<div class="panel" id="panel-tea">

  <!-- 新增茶製 -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-title">🍵 記錄煮好時間</div>
      <button class="btn btn-outline btn-sm" onclick="teaLoadToday()">🔄 重新載入</button>
    </div>
    <div class="card-body">
      <div class="grid3">
        <div class="field">
          <label>桶號</label>
          <select id="t-barrel">
            <option value="1">1號桶</option>
            <option value="2">2號桶</option>
            <option value="3">3號桶</option>
          </select>
        </div>
        <div class="field">
          <label>茶種</label>
          <select id="t-type">
            <option value="烏龍茶">烏龍茶</option>
            <option value="紅茶">紅茶</option>
            <option value="青茶">青茶</option>
          </select>
        </div>
        <div class="field">
          <label>煮好時間</label>
          <input type="time" id="t-cook-time">
        </div>
      </div>
      <button class="btn btn-g" onclick="teaAdd()">＋ 記錄煮好</button>
    </div>
  </div>

  <div class="section-title">今日茶製記錄</div>
  <div id="tea-list"><div class="empty">載入中...</div></div>

</div>

<div class="toast" id="toast"></div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbxCl8Kk2rj083r4CEbaf4eB3uSPmDE5aNv-92KD-NTfbARMXTjjgxC9uVWcZfNQ54GG/exec';

// ── 初始化 ─────────────────────────────────────────────────
window.onload = function(){
  // 初始化時間
  var now = new Date();
  var pad = function(n){ return String(n).padStart(2,'0'); };
  document.getElementById('t-cook-time').value = pad(now.getHours())+':'+pad(now.getMinutes());

  loadActives();
  loadLogs();
  teaLoadToday();
};

// ── API ────────────────────────────────────────────────────
function api(params, cb){
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&');
  fetch(API_URL+'?'+qs)
    .then(function(r){ return r.json(); })
    .then(function(d){ cb(d); })
    .catch(function(){ cb(null); });
}
function apiPost(params, cb){
  fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:Object.keys(params).map(function(k){
      return encodeURIComponent(k)+'='+encodeURIComponent(String(params[k]));
    }).join('&')
  }).then(function(r){ return r.json(); }).then(function(d){ cb(d); }).catch(function(){ cb(null); });
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function todayStr(){
  var d=new Date(), pad=function(n){return String(n).padStart(2,'0');};
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function nowTimeStr(){
  var d=new Date(), pad=function(n){return String(n).padStart(2,'0');};
  return pad(d.getHours())+':'+pad(d.getMinutes());
}

// ── 分頁切換 ──────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('on', (i===0&&tab==='jelly')||(i===1&&tab==='tea'));
  });
  document.getElementById('panel-jelly').classList.toggle('on', tab==='jelly');
  document.getElementById('panel-tea').classList.toggle('on', tab==='tea');
}

// ════════════════════════════════════
// 仙草凍記錄
// ════════════════════════════════════
var actives = [];

function jellyAddNew(){
  var item   = document.getElementById('j-item').value;
  var barrel = document.getElementById('j-barrel').value;
  var weight = document.getElementById('j-weight').value;
  var id     = String(Date.now());
  var now    = nowTimeStr();
  apiPost({action:'jellySaveActive', id:id, item:item, barrel:barrel, weight:weight,
    stage:'cook', cook_t:now, cook_p:''},
    function(d){
      if(d&&d.ok){ showToast('✓ '+item+' '+barrel+' 煮好記錄 '+now); loadActives(); }
      else showToast('❌ 記錄失敗');
    }
  );
}

function loadActives(){
  api({action:'jellyGetActives'}, function(d){
    actives = (d&&d.ok&&d.data) ? d.data : [];
    renderActives();
  });
}

var STAGES = [
  {key:'cook',  label:'煮好', field:'cook_t'},
  {key:'lower', label:'下桶', field:'lower_t'},
  {key:'upper', label:'上層', field:'upper_t'},
  {key:'bed',   label:'床層', field:'bed_t'},
  {key:'wash',  label:'清洗', field:'wash_t'},
];
var STAGE_NEXT = {cook:'lower',lower:'upper',upper:'bed',bed:'wash'};

function renderActives(){
  var el = document.getElementById('actives-list');
  if(!actives.length){ el.innerHTML='<div class="empty">目前無進行中記錄</div>'; return; }
  el.innerHTML = actives.map(function(r){
    var stageIdx = STAGES.findIndex(function(s){ return s.key===r.stage; });
    var stagesHtml = STAGES.map(function(s,i){
      var t = r[s.key] ? r[s.key].t : '';
      var done = t && i < stageIdx;
      var cur  = i === stageIdx;
      return '<div class="stage-row">'
        +'<span class="stage-lbl">'+s.label+'</span>'
        +(t ? '<span class="stage-time">'+t+'</span>' : '<span class="stage-empty">—</span>')
        +(done?'<span class="stage-badge stage-done">✓</span>':cur?'<span class="stage-badge stage-cur">進行中</span>':'')
      +'</div>';
    }).join('');
    var nextStage = STAGE_NEXT[r.stage];
    var actionsHtml = '<div class="action-row">';
    if(nextStage){
      var nextLabel = STAGES.find(function(s){return s.key===nextStage;}).label;
      actionsHtml += '<button class="btn btn-b btn-sm" onclick="jellyNextStage(\''+r.id+'\',\''+nextStage+'\')">記錄'+nextLabel+' ⟶</button>';
    }
    if(r.stage==='wash'){
      actionsHtml += '<button class="btn btn-g btn-sm" onclick="jellyComplete(\''+r.id+'\')">✓ 完成</button>';
    }
    actionsHtml += '<button class="btn btn-red btn-sm" onclick="jellyDelete(\''+r.id+'\')">✕ 刪除</button></div>';
    return '<div class="active-card">'
      +'<div class="active-head">'
        +'<span class="active-item">'+r.item+'</span>'
        +'<span class="active-barrel">'+r.barrel+'</span>'
        +(r.weight?'<span style="font-size:12px;color:var(--ink3)">'+r.weight+'g</span>':'')
      +'</div>'
      +stagesHtml
      +actionsHtml
    +'</div>';
  }).join('');
}

function jellyNextStage(id, nextStage){
  var r = actives.find(function(a){ return String(a.id)===String(id); });
  if(!r) return;
  var now = nowTimeStr();
  var p = {action:'jellySaveActive', id:id, item:r.item, barrel:r.barrel,
    weight:r.weight||'', stage:nextStage,
    cook_t:r.cook?r.cook.t:'', lower_t:r.lower?r.lower.t:'',
    upper_t:r.upper?r.upper.t:'', bed_t:r.bed?r.bed.t:'', wash_t:r.wash?r.wash.t:''};
  p[nextStage+'_t'] = now;
  apiPost(p, function(d){
    if(d&&d.ok){ showToast('✓ '+STAGES.find(function(s){return s.key===nextStage;}).label+' '+now); loadActives(); }
    else showToast('❌ 更新失敗');
  });
}

function jellyComplete(id){
  if(!confirm('確定完成並移至歷史記錄？')) return;
  api({action:'jellyComplete', id:id}, function(d){
    if(d&&d.ok){ showToast('✓ 已完成'); loadActives(); loadLogs(); }
    else showToast('❌ 失敗');
  });
}

function jellyDelete(id){
  if(!confirm('確定刪除此進行中記錄？')) return;
  api({action:'jellyDeleteActive', id:id}, function(d){
    if(d&&d.ok){ showToast('已刪除'); loadActives(); }
  });
}

function loadLogs(){
  var item = document.getElementById('j-log-item').value;
  api({action:'jellyGetLogs', item:item}, function(d){
    var logs = (d&&d.ok&&d.data) ? d.data : [];
    renderLogs(logs);
  });
}

function renderLogs(logs){
  var el = document.getElementById('logs-list');
  if(!logs.length){ el.innerHTML='<div class="empty">尚無完成記錄</div>'; return; }
  el.innerHTML = logs.slice(0,30).map(function(r){
    var stages = STAGES.filter(function(s){ return r[s.key]&&r[s.key].t; });
    return '<div class="log-card">'
      +'<div class="log-head">'
        +'<span class="log-item">'+r.item+' '+r.barrel+(r.weight?' ('+r.weight+'g)':'')+'</span>'
        +'<div style="display:flex;align-items:center;gap:8px">'
          +'<span class="log-date">'+(r.cook&&r.cook.t?r.cook.t:'')+'</span>'
          +'<button onclick="jellyLogDelete(\''+r.id+'\')" style="border:none;background:var(--redl);color:var(--red);padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer">✕</button>'
        +'</div>'
      +'</div>'
      +'<div class="log-stages">'
        +stages.map(function(s){ return '<span class="log-stage">'+s.label+' '+r[s.key].t+'</span>'; }).join(' → ')
      +'</div>'
    +'</div>';
  }).join('');
}

function jellyLogDelete(id){
  if(!confirm('確定刪除此完成記錄？')) return;
  api({action:'jellyDeleteLog', id:id}, function(d){
    if(d&&d.ok){ showToast('已刪除'); loadLogs(); }
  });
}

// ════════════════════════════════════
// 茶製記錄
// ════════════════════════════════════
var teaRecs = [];

function teaLoadToday(){
  api({action:'teaLogGetAll', date:todayStr()}, function(d){
    teaRecs = (d&&d.ok&&d.data) ? d.data : [];
    renderTeaList();
  });
}

function teaAdd(){
  var barrel   = document.getElementById('t-barrel').value;
  var teaType  = document.getElementById('t-type').value;
  var cookTime = document.getElementById('t-cook-time').value;
  if(!cookTime){ showToast('請填入煮好時間'); return; }
  var id = String(Date.now());
  apiPost({action:'teaLogSave', id:id, date:todayStr(), barrel:barrel,
    teaType:teaType, cookTime:cookTime, washTime:'', durationMin:0, person:'', note:''},
    function(d){
      if(d&&d.ok){
        teaRecs.unshift({id:id, date:todayStr(), barrel:barrel, teaType:teaType,
          cookTime:cookTime, washTime:'', durationMin:0});
        renderTeaList();
        showToast('✓ '+teaType+' '+barrel+'號桶 煮好 '+cookTime);
        // 更新時間為現在
        var now = new Date(), pad=function(n){return String(n).padStart(2,'0');};
        document.getElementById('t-cook-time').value = pad(now.getHours())+':'+pad(now.getMinutes());
      } else showToast('❌ 記錄失敗');
    }
  );
}

function teaWash(id){
  var r = teaRecs.find(function(x){ return String(x.id)===String(id); });
  if(!r) return;
  var washTime = nowTimeStr();
  var durationMin = 0;
  if(r.cookTime){
    var c=r.cookTime.split(':'), w=washTime.split(':');
    durationMin = (parseInt(w[0])*60+parseInt(w[1])) - (parseInt(c[0])*60+parseInt(c[1]));
    if(durationMin<0) durationMin+=1440;
  }
  apiPost({action:'teaLogSave', id:id, date:r.date, barrel:r.barrel, teaType:r.teaType,
    cookTime:r.cookTime, washTime:washTime, durationMin:durationMin, person:r.person||'', note:r.note||''},
    function(d){
      if(d&&d.ok){
        r.washTime = washTime; r.durationMin = durationMin;
        renderTeaList();
        var h=Math.floor(durationMin/60), m=durationMin%60;
        showToast('✓ 已記錄清洗　使用 '+h+'h'+m+'m');
      }
    }
  );
}

function teaDelete(id){
  if(!confirm('確定刪除此茶製記錄？')) return;
  api({action:'teaLogDelete', id:id}, function(d){
    if(d&&d.ok){
      teaRecs = teaRecs.filter(function(r){ return String(r.id)!==String(id); });
      renderTeaList();
      showToast('已刪除');
    }
  });
}

var TEA_ICONS = {烏龍茶:'🍵', 紅茶:'☕', 青茶:'🌿'};

function renderTeaList(){
  var el = document.getElementById('tea-list');
  if(!teaRecs.length){ el.innerHTML='<div class="empty">今日尚無茶製記錄</div>'; return; }
  el.innerHTML = teaRecs.map(function(r){
    var icon = TEA_ICONS[r.teaType]||'🍵';
    var washed = !!r.washTime;
    var durationStr = '';
    if(r.durationMin>0){
      durationStr = '使用 '+Math.floor(r.durationMin/60)+'h'+r.durationMin%60+'m';
    }
    return '<div class="tea-card'+(washed?' washed':'')+'">'
      +'<span style="font-size:22px">'+icon+'</span>'
      +'<div class="tea-info">'
        +'<div class="tea-name">'+r.barrel+'號桶　'+r.teaType+'</div>'
        +'<div class="tea-time">煮好 '+r.cookTime+(r.washTime ? '　清洗 '+r.washTime : '　尚未清洗')+'</div>'
        +(durationStr?'<div class="tea-duration">⏱ '+durationStr+'</div>':'')
      +'</div>'
      +(!washed?'<button class="btn btn-b btn-sm" onclick="teaWash(\''+r.id+'\')">🫧 清洗</button>':'<span style="color:var(--g);font-size:13px;font-weight:700">✓ 完成</span>')
      +'<button class="btn btn-red btn-sm" onclick="teaDelete(\''+r.id+'\')">✕</button>'
    +'</div>';
  }).join('');
}
</script>
</body>
</html>
