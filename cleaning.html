<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>清潔管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --b:#1A3A5C;--bl:#E8F0F8;--bm:#2a5080;
  --g:#2E7D32;--gl:#E8F5E9;--gm:#4CAF50;
  --red:#C62828;--redl:#FFEBEE;--redm:#EF5350;
  --amber:#E65100;--amberl:#FFF3E0;--amberm:#FF8F00;
  --ink:#1a1a1a;--ink2:#444;--ink3:#888;
  --bd:#e0e0e0;--bg:#f4f6f9;--white:#fff;
  --r:14px;--r2:10px;--r3:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);height:100dvh;overflow:hidden;display:flex;flex-direction:column}

/* ── 頂部欄 ── */
.topbar{background:linear-gradient(135deg,#142E4A,#1E4A78);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left h1{font-size:16px;font-weight:700;color:#fff}
.logo-badge{font-size:10px;color:rgba(255,255,255,.7);margin-bottom:2px}
.tib{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tib:active{background:rgba(255,255,255,.28)}
.top-btns{display:flex;gap:6px}

/* ── Tab ── */
.tabs{display:flex;border-bottom:2px solid var(--bd);background:var(--white);flex-shrink:0}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:13px;font-weight:600;color:var(--ink3);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px}
.tab.on{color:var(--b);border-bottom-color:var(--b)}

/* ── 通用 main ── */
.main{flex:1;overflow-y:auto;padding:14px}

/* ══════════════════════════════════
   畫面 A：區塊列表
══════════════════════════════════ */
/* 人員選擇橫列 */
.person-row{display:flex;align-items:center;gap:8px;background:var(--white);border-radius:var(--r2);border:1px solid var(--bd);padding:10px 14px;margin-bottom:12px}
.person-row-lbl{font-size:12px;color:var(--ink3);font-weight:600;white-space:nowrap}
.person-chips{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.pchip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bd);background:var(--bg);font-size:13px;font-weight:600;cursor:pointer;color:var(--ink2)}
.pchip.on{background:var(--b);border-color:var(--b);color:#fff}

/* 總進度 */
.total-prog{background:var(--white);border-radius:var(--r2);border:1px solid var(--bd);padding:12px 14px;margin-bottom:12px}
.total-prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.total-prog-lbl{font-size:13px;font-weight:600;color:var(--ink2)}
.total-prog-pct{font-size:20px;font-weight:900;color:var(--b)}
.prog-bar{height:7px;background:#e8edf4;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gm),#81C784);border-radius:4px;transition:width .4s}

/* 區塊卡片 */
.area-card{background:var(--white);border-radius:var(--r);border:1.5px solid var(--bd);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.area-card:active{transform:scale(.99)}
.area-card.done{border-color:var(--gm)}
.area-card.current{border-color:var(--b);box-shadow:0 0 0 3px rgba(26,58,92,.12)}
.area-card-inner{display:flex;align-items:center;gap:12px;padding:14px 16px}
.area-icon{width:42px;height:42px;border-radius:10px;background:var(--bl);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.area-card.done .area-icon{background:var(--gl)}
.area-card.current .area-icon{background:var(--bl)}
.area-info{flex:1;min-width:0}
.area-name{font-size:15px;font-weight:700;color:var(--ink)}
.area-meta{font-size:12px;color:var(--ink3);margin-top:2px}
.area-status{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.area-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
.area-badge.done{background:var(--gl);color:var(--g)}
.area-badge.todo{background:var(--bl);color:var(--b)}
.area-badge.partial{background:var(--amberl);color:var(--amber)}
.mini-steps{display:flex;gap:3px}
.mini-dot{width:7px;height:7px;border-radius:50%;background:var(--bd)}
.mini-dot.done{background:var(--gm)}

/* ══════════════════════════════════
   畫面 B：步驟執行
══════════════════════════════════ */
#screen-steps{display:none;flex:1;flex-direction:column;overflow:hidden}

/* 步驟頂部 */
.step-topbar{background:var(--b);padding:12px 16px;display:flex;align-items:center;gap:10px}
.step-back{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-header-info{flex:1;min-width:0}
.step-area-name{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step-progress-txt{font-size:12px;color:rgba(255,255,255,.75);margin-top:1px}
.step-pct{font-size:18px;font-weight:900;color:#fff;flex-shrink:0}

/* 步驟進度點 */
.step-dots{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--bd);flex-wrap:wrap}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--bd);transition:all .2s}
.step-dot.done{background:var(--gm)}
.step-dot.current{background:var(--b);width:14px;height:14px}

/* 步驟卡片區（可滑動） */
.step-body{flex:1;overflow-y:auto;padding:16px}

/* 單一步驟卡 */
.step-card{background:var(--white);border-radius:var(--r);border:1.5px solid var(--bd);padding:18px 16px;margin-bottom:12px;transition:border-color .15s,background .15s}
.step-card.done{border-color:var(--gm);background:var(--gl)}
.step-card.current-step{border-color:var(--b);box-shadow:0 2px 12px rgba(26,58,92,.12)}
.step-num{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.step-num-circle{width:22px;height:22px;border-radius:50%;background:var(--bl);color:var(--b);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.step-card.done .step-num-circle{background:var(--gm);color:#fff}
.step-task{font-size:15px;font-weight:600;line-height:1.5;color:var(--ink);margin-bottom:8px}
.step-tool{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:4px;margin-bottom:10px}

/* 備注輸入（有 needNote 的步驟） */
.note-section{display:none;margin-top:8px;padding-top:10px;border-top:1px solid var(--bd)}
.step-card.current-step .note-section{display:block}
.step-card.done .note-section{display:block}
.note-label{font-size:12px;font-weight:700;color:var(--amber);margin-bottom:5px}
.note-inp{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:var(--r3);font-size:14px;font-family:inherit;background:var(--bg);color:var(--ink);resize:none}
.note-inp:focus{outline:none;border-color:var(--b)}

/* 完成按鈕 */
.step-footer{padding:12px 16px;background:var(--white);border-top:1px solid var(--bd);flex-shrink:0}
.step-done-btn{width:100%;padding:15px;border-radius:var(--r);border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.step-done-btn.confirm{background:var(--b);color:#fff}
.step-done-btn.next-area{background:var(--gm);color:#fff}
.step-done-btn.all-done{background:var(--g);color:#fff}
.step-done-btn.disabled{background:var(--bd);color:var(--ink3);cursor:not-allowed}
.step-done-btn:active:not(.disabled){opacity:.85;transform:scale(.99)}

/* ══════════════════════════════════
   歷史、設定 tab
══════════════════════════════════ */
.hist-rec{background:var(--white);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:8px;overflow:hidden}
.hist-head{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.hist-date{font-size:14px;font-weight:700}
.hist-meta{font-size:12px;color:var(--ink3)}
.hist-rate{font-size:13px;font-weight:700;padding:3px 10px;border-radius:12px}
.hist-rate.full{background:var(--gl);color:var(--g)}
.hist-rate.partial{background:var(--amberl);color:var(--amber)}
.hist-body{padding:0 14px 12px;display:none;border-top:1px solid var(--bd);padding-top:10px}
.hist-body.open{display:block}
.hist-area{margin-bottom:8px}
.hist-area-name{font-size:12px;font-weight:700;color:var(--ink3);margin-bottom:4px}
.hist-step{display:flex;align-items:flex-start;gap:8px;font-size:13px;padding:3px 0}
.hist-note{font-size:11px;color:var(--amber);margin-top:1px}

/* 設定 */
.cfg-area-group{background:var(--white);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:8px;overflow:hidden}
.cfg-area-head{padding:10px 14px;background:var(--bl);font-size:13px;font-weight:700;color:var(--b);display:flex;align-items:center;justify-content:space-between}
.cfg-step-row{display:flex;align-items:flex-start;gap:8px;padding:9px 14px;border-top:1px solid var(--bd)}
.cfg-step-info{flex:1;min-width:0}
.cfg-step-task{font-size:13px;font-weight:600;color:var(--ink);line-height:1.4}
.cfg-step-meta{font-size:11px;color:var(--ink3);margin-top:2px}
.cfg-del-btn{border:none;background:var(--redl);color:var(--red);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
.cfg-edit-btn{border:1.5px solid var(--bd);background:var(--white);color:var(--ink2);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;margin-right:5px}
.cfg-edit-form{background:var(--bg);border-top:1px solid var(--bd);padding:12px 14px;display:none}
.cfg-edit-form.open{display:block}
.cfg-ef-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cfg-ef-inp{width:100%;padding:8px 10px;border:1.5px solid var(--bd);border-radius:var(--r3);font-size:13px;font-family:inherit;color:var(--ink);background:var(--white)}
.cfg-ef-inp:focus{outline:none;border-color:var(--b)}
.cfg-ef-check{display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:8px}
.cfg-save-btn{padding:8px 18px;border-radius:var(--r3);border:none;background:var(--b);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.cfg-cancel-btn{padding:8px 14px;border-radius:var(--r3);border:1.5px solid var(--bd);background:var(--white);color:var(--ink2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-left:6px}
.add-form{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-top:10px}
.form-lbl{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.06em;margin-bottom:4px}
.form-inp,.form-sel{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:var(--r3);font-size:14px;font-family:inherit;color:var(--ink);background:var(--white);margin-bottom:8px}
.form-inp:focus,.form-sel:focus{outline:none;border-color:var(--b)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-check{display:flex;align-items:center;gap:6px;font-size:13px;margin:4px 0 8px}
.add-btn{width:100%;padding:12px;border-radius:var(--r3);border:none;background:var(--b);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* 空白提示 */
.empty{text-align:center;padding:40px 20px;color:var(--ink3);font-size:14px}

/* Toast */
#toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,.93);color:#fff;padding:9px 18px;border-radius:20px;font-size:14px;z-index:999;white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis}

/* 送出完成彈窗 */
.done-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.done-overlay.show{display:flex}
.done-sheet{background:var(--white);border-radius:20px;width:calc(100% - 40px);max-width:380px;padding:28px 24px;text-align:center}
.done-icon{font-size:56px;margin-bottom:12px}
.done-title{font-size:20px;font-weight:900;color:var(--g);margin-bottom:6px}
.done-sub{font-size:14px;color:var(--ink3);margin-bottom:20px}
.done-btn{width:100%;padding:14px;border-radius:var(--r2);border:none;background:var(--b);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<!-- 頂部欄 -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-badge">瀧飲山潮・學士店</div>
    <h1>清潔管理</h1>
  </div>
  <div class="top-btns">
    <button class="tib" onclick="showTab('hist')" title="記錄">📋</button>
    <button class="tib" onclick="showTab('cfg')" title="設定">⚙️</button>
    <button class="tib" onclick="syncItems()" title="同步">🔄</button>
  </div>
</div>

<!-- Tab -->
<div class="tabs" id="main-tabs">
  <button class="tab on" id="tab-daily"   onclick="switchMode('daily')">🧹 日清潔</button>
  <button class="tab"    id="tab-weekly"  onclick="switchMode('weekly')">📅 週清潔</button>
  <button class="tab"    id="tab-monthly" onclick="switchMode('monthly')">🗓 月清潔</button>
  <button class="tab"    id="tab-hist"    onclick="showTab('hist')">📋 記錄</button>
  <button class="tab"    id="tab-cfg"     onclick="showTab('cfg')">⚙️ 設定</button>
</div>

<!-- ══ 畫面 A：區塊列表 ══ -->
<div id="screen-list" style="display:flex;flex:1;flex-direction:column;overflow:hidden">
  <div class="main" id="list-scroll">
    <!-- 人員選擇 -->
    <div class="person-row">
      <div class="person-row-lbl">👤 執行人員</div>
      <div class="person-chips" id="person-chips"></div>
    </div>
    <!-- 總進度 -->
    <div class="total-prog">
      <div class="total-prog-top">
        <div class="total-prog-lbl" id="prog-lbl">選擇人員後開始清潔</div>
        <div class="total-prog-pct" id="prog-pct">0%</div>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <!-- 區塊列表 -->
    <div id="area-list"></div>
  </div>
  <!-- 提交按鈕 -->
  <div style="padding:12px 14px;background:var(--white);border-top:1px solid var(--bd)">
    <button id="submit-btn" style="width:100%;padding:14px;border-radius:var(--r);border:none;background:var(--bd);color:var(--ink3);font-size:15px;font-weight:700;cursor:not-allowed;font-family:inherit" onclick="submitCleaning()">✓ 提交清潔記錄</button>
  </div>
</div>

<!-- ══ 畫面 B：步驟執行 ══ -->
<div id="screen-steps" style="display:none;flex:1;flex-direction:column;overflow:hidden">
  <div class="step-topbar">
    <button class="step-back" onclick="backToList()">←</button>
    <div class="step-header-info">
      <div class="step-area-name" id="step-area-name"></div>
      <div class="step-progress-txt" id="step-progress-txt"></div>
    </div>
    <div class="step-pct" id="step-pct">0%</div>
  </div>
  <div class="step-dots" id="step-dots"></div>
  <div class="step-body" id="step-body"></div>
  <div class="step-footer">
    <button class="step-done-btn disabled" id="step-done-btn" onclick="stepDone()">✓ 完成此步驟</button>
  </div>
</div>

<!-- ══ 歷史記錄 ══ -->
<div id="screen-hist" style="display:none;flex:1;flex-direction:column;overflow:hidden">
  <div class="main">
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <select id="hist-mode-sel" onchange="loadHist()" style="padding:7px 10px;border:1.5px solid var(--bd);border-radius:var(--r3);font-size:13px;background:var(--white)">
        <option value="">全部週期</option>
        <option value="daily">日清潔</option>
        <option value="weekly">週清潔</option>
        <option value="monthly">月清潔</option>
      </select>
      <input type="month" id="hist-month" onchange="loadHist()" style="padding:7px 10px;border:1.5px solid var(--bd);border-radius:var(--r3);font-size:13px;background:var(--white)">
    </div>
    <div id="hist-body"><div class="empty">載入中…</div></div>
  </div>
</div>

<!-- ══ 設定 ══ -->
<div id="screen-cfg" style="display:none;flex:1;flex-direction:column;overflow:hidden">
  <!-- 設定子頁籤 -->
  <div style="display:flex;border-bottom:2px solid var(--bd);background:var(--white);flex-shrink:0">
    <button class="cfg-subtab on" id="cst-steps" onclick="switchCfgSub('steps')" style="flex:1;padding:9px 4px;text-align:center;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--b);border-bottom:2px solid var(--b);margin-bottom:-2px">📋 步驟</button>
    <button class="cfg-subtab" id="cst-areas" onclick="switchCfgSub('areas')" style="flex:1;padding:9px 4px;text-align:center;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--ink3);border-bottom:2px solid transparent;margin-bottom:-2px">📍 區塊庫</button>
    <button class="cfg-subtab" id="cst-tools" onclick="switchCfgSub('tools')" style="flex:1;padding:9px 4px;text-align:center;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--ink3);border-bottom:2px solid transparent;margin-bottom:-2px">🔧 器具庫</button>
  </div>

  <!-- 子頁：步驟設定 -->
  <div id="cfg-sub-steps" style="flex:1;overflow-y:auto;padding:14px">
    <select id="cfg-mode-sel" onchange="renderCfg()" style="padding:8px 11px;border:1.5px solid var(--bd);border-radius:var(--r3);font-size:13px;background:var(--white);margin-bottom:10px;width:100%">
      <option value="daily">日清潔</option>
      <option value="weekly">週清潔</option>
      <option value="monthly">月清潔</option>
    </select>
    <div id="cfg-body"></div>
    <div class="add-form">
      <div style="font-size:13px;font-weight:700;color:var(--b);margin-bottom:10px">＋ 新增清潔步驟</div>
      <div class="form-row">
        <div>
          <div class="form-lbl">區塊 *</div>
          <select class="form-sel" id="ni-area"><option value="">選擇區塊…</option></select>
        </div>
        <div>
          <div class="form-lbl">使用器具</div>
          <select class="form-sel" id="ni-tool"><option value="">（無）</option></select>
        </div>
      </div>
      <div class="form-lbl">步驟內容 *</div>
      <textarea class="form-inp" id="ni-task" rows="2" placeholder="詳細描述此步驟的清潔動作"></textarea>
      <div class="form-check">
        <input type="checkbox" id="ni-needNote">
        <label for="ni-needNote" style="cursor:pointer">需要備注</label>
      </div>
      <div id="ni-tip-wrap" style="display:none">
        <div class="form-lbl">備注提示</div>
        <input class="form-inp" id="ni-notetip" placeholder="如：有髒污請描述">
      </div>
      <button class="add-btn" onclick="addCleanItem()">新增步驟</button>
    </div>
  </div>

  <!-- 子頁：區塊庫 -->
  <div id="cfg-sub-areas" style="display:none;flex:1;overflow-y:auto;padding:14px">
    <div id="area-lib-list"></div>
    <div class="add-form" style="margin-top:10px">
      <div style="font-size:13px;font-weight:700;color:var(--b);margin-bottom:10px">＋ 新增區塊</div>
      <div class="form-lbl">區塊名稱 *</div>
      <input class="form-inp" id="new-area-name" placeholder="如：矮冰箱、倉庫…">
      <button class="add-btn" onclick="addArea()">新增區塊</button>
    </div>
  </div>

  <!-- 子頁：器具庫 -->
  <div id="cfg-sub-tools" style="display:none;flex:1;overflow-y:auto;padding:14px">
    <div id="tool-lib-list"></div>
    <div class="add-form" style="margin-top:10px">
      <div style="font-size:13px;font-weight:700;color:var(--b);margin-bottom:10px">＋ 新增器具</div>
      <div class="form-lbl">器具名稱 *</div>
      <input class="form-inp" id="new-tool-name" placeholder="如：菜瓜布、刷子…">
      <button class="add-btn" onclick="addTool()">新增器具</button>
    </div>
  </div>
</div>

<!-- 完成彈窗 -->
<div class="done-overlay" id="done-overlay">
  <div class="done-sheet">
    <div class="done-icon">🎉</div>
    <div class="done-title">清潔完成！</div>
    <div class="done-sub" id="done-sub"></div>
    <button class="done-btn" onclick="closeDone()">確認</button>
  </div>
</div>

<div id="toast"></div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbxCl8Kk2rj083r4CEbaf4eB3uSPmDE5aNv-92KD-NTfbARMXTjjgxC9uVWcZfNQ54GG/exec';

// ── 狀態 ──────────────────────────────────────────────────
var allItems   = [];    // 從 Sheets 或預設讀取的清潔步驟
var persons    = [];    // 人員名單
var cleanTools = [];    // 器具庫
var cleanAreas = [];    // 區塊庫
var selPerson  = localStorage.getItem('clean_person')||'';
var curMode    = 'daily';   // daily | weekly | monthly
var curTab     = 'daily';

// 每個 mode 的勾選進度
// checks[mode][itemId] = {done:bool, note:string}
var checks = {daily:{}, weekly:{}, monthly:{}};

// 步驟頁狀態
var curAreaIdx  = 0;    // 目前在第幾個區塊
var curStepIdx  = 0;    // 目前在第幾個步驟（0-indexed）
var curAreas    = [];   // 當前 mode 的區塊陣列 [{area, steps:[item,...]}]

// ── API ────────────────────────────────────────────────────
function api(params,cb){
  var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
  fetch(API_URL+'?'+qs).then(function(r){return r.json();}).then(function(d){if(cb)cb(d,null);}).catch(function(e){if(cb)cb(null,e);});
}
function apiPost(params,cb){
  var body=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(String(params[k]));}).join('&');
  fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body}).then(function(r){return r.json();}).then(function(d){if(cb)cb(d,null);}).catch(function(e){if(cb)cb(null,e);});
}

// ── 初始化 ─────────────────────────────────────────────────
window.onload=function(){
  var m=new Date();
  document.getElementById('hist-month').value=m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0');
  document.getElementById('ni-needNote').addEventListener('change',function(){
    document.getElementById('ni-tip-wrap').style.display=this.checked?'block':'none';
  });
  loadPersons();
  syncTools(function(){ syncAreas(function(){ syncItems(); }); });
};

function syncItems(){
  api({action:'cleanItemGetAll'},function(d){
    if(d&&d.ok&&d.data&&d.data.length>0){
      allItems=d.data;
      localStorage.setItem('clean_items',JSON.stringify(allItems));
      renderAll();
      if(curCfgSub==='steps') renderCfg();
      showToast('✓ 清潔項目已同步');
    } else {
      loadLocalItems();
    }
  });
}
function syncTools(cb){
  api({action:'cleanToolGetAll'},function(d){
    if(d&&d.ok&&d.data){
      cleanTools=d.data;
      localStorage.setItem('clean_tools',JSON.stringify(cleanTools));
    } else {
      try{var s=localStorage.getItem('clean_tools');if(s)cleanTools=JSON.parse(s);}catch(e){}
      if(!cleanTools.length) cleanTools=['抹布','雞毛撣子','雞毛撣子/抹布','掃把/拖把','抹布/噴槍','抹布/雞毛撣子','水槽','清潔劑/抹布'];
    }
    if(cb)cb();
  });
}
function syncAreas(cb){
  api({action:'cleanAreaGetAll'},function(d){
    if(d&&d.ok&&d.data){
      cleanAreas=d.data;
      localStorage.setItem('clean_areas',JSON.stringify(cleanAreas));
    } else {
      try{var s=localStorage.getItem('clean_areas');if(s)cleanAreas=JSON.parse(s);}catch(e){}
      if(!cleanAreas.length) cleanAreas=['臥式冰箱','矮櫃冰箱','透明冰箱及四門冰箱','冰塊櫃','智能機','封口機/蒸氣加熱機','電磁爐及層架','電視機','陶罐','櫃臺','地面','內場地板','外場走廊','走廊','冷氣機','全店','廁所'];
    }
    if(cb)cb();
  });
}
function loadLocalItems(){
  try{var s=localStorage.getItem('clean_items');if(s){allItems=JSON.parse(s);renderAll();return;}}catch(e){}
  allItems=DEFAULT_ITEMS.slice();
  renderAll();
}
function loadPersons(){
  api({action:'getEmps'},function(d){
    persons=d&&d.ok&&d.data?d.data:['榮富','冠銘','柏廷','鈞凱','家暉','宥霖','冠文'];
    buildPersonChips();
  });
}

// ── 取得區塊結構 ───────────────────────────────────────────
function getAreas(mode){
  var modeItems=allItems.filter(function(i){return i.mode===mode;});
  var order=[],map={};
  modeItems.forEach(function(item){
    if(!map[item.area]){map[item.area]=[];order.push(item.area);}
    map[item.area].push(item);
  });
  return order.map(function(a){return{area:a,steps:map[a]};});
}

// ── Tab 切換 ───────────────────────────────────────────────
function switchMode(mode){
  curMode=mode;
  curTab=mode;
  ['daily','weekly','monthly','hist','cfg'].forEach(function(n){
    var t=document.getElementById('tab-'+n);
    if(t)t.classList.toggle('on',n===mode);
  });
  showScreen('list');
  renderAll();
}
function showTab(tab){
  curTab=tab;
  ['daily','weekly','monthly','hist','cfg'].forEach(function(n){
    var t=document.getElementById('tab-'+n);
    if(t)t.classList.toggle('on',n===tab);
  });
  if(tab==='hist'){showScreen('hist');loadHist();}
  else if(tab==='cfg'){showScreen('cfg');updateLibSelects();renderCfg();}
}
function showScreen(name){
  ['list','steps','hist','cfg'].forEach(function(n){
    var el=document.getElementById('screen-'+n);
    if(el)el.style.display=n===name?'flex':'none';
  });
}

// ── 區塊列表渲染 ───────────────────────────────────────────
function renderAll(){
  buildPersonChips();
  renderAreaList();
  updateTotalProg();
}
function buildPersonChips(){
  var el=document.getElementById('person-chips');
  if(!el)return;
  el.innerHTML=persons.map(function(p){
    return '<button class="pchip'+(p===selPerson?' on':'')+'" data-p="'+p+'">'+p+'</button>';
  }).join('');
  el.onclick=function(e){
    var btn=e.target.closest('[data-p]');
    if(!btn)return;
    selPerson=btn.getAttribute('data-p');
    localStorage.setItem('clean_person',selPerson);
    buildPersonChips();
    updateTotalProg();
    renderAreaList();
  };
}

function renderAreaList(){
  var areas=getAreas(curMode);
  curAreas=areas;
  var el=document.getElementById('area-list');
  if(!areas.length){el.innerHTML='<div class="empty">此週期尚無清潔項目<br>請至 ⚙️ 設定新增</div>';return;}
  // 圖示對應
  var icons={'臥式冰箱':'🧊','冰箱':'🧊','矮櫃冰箱':'🧊','透明冰箱及四門冰箱':'🧊','冰塊櫃':'🧊',
    '櫃臺':'🏪','地面':'🧹','外場走廊':'🚶','走廊':'🚶','電視機':'📺',
    '智能機':'🤖','封口機/蒸氣加熱機':'⚙️','電磁爐及層架':'🔥',
    '陶罐':'🏺','冷氣機':'❄️','全店':'🏠','廁所':'🚿','內場地板':'🧹'};
  el.innerHTML=areas.map(function(a,idx){
    var steps=a.steps;
    var doneCount=steps.filter(function(s){return checks[curMode][s.id]&&checks[curMode][s.id].done;}).length;
    var allDone=doneCount===steps.length;
    var icon=icons[a.area]||'🧼';
    var badgeText=allDone?'完成':doneCount>0?doneCount+'/'+steps.length+' 步':'開始';
    var badgeCls=allDone?'done':doneCount>0?'partial':'todo';
    var cardCls='area-card'+(allDone?' done':'');
    var dots=steps.map(function(s){
      var done=checks[curMode][s.id]&&checks[curMode][s.id].done;
      return '<span class="mini-dot'+(done?' done':'')+'"></span>';
    }).join('');
    return '<div class="'+cardCls+'" data-area-idx="'+idx+'">'
      +'<div class="area-card-inner">'
        +'<div class="area-icon">'+icon+'</div>'
        +'<div class="area-info">'
          +'<div class="area-name">'+a.area+'</div>'
          +'<div class="area-meta">'+steps.length+' 個步驟'+(a.steps[0].tool?'　🔧 '+a.steps.map(function(s){return s.tool;}).filter(function(t,i,arr){return t&&arr.indexOf(t)===i;}).join('、'):'')+'</div>'
        +'</div>'
        +'<div class="area-status">'
          +'<span class="area-badge '+badgeCls+'">'+badgeText+'</span>'
          +'<div class="mini-steps">'+dots+'</div>'
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
  el.onclick=function(e){
    var card=e.target.closest('[data-area-idx]');
    if(!card)return;
    if(!selPerson){showToast('請先選擇執行人員');return;}
    var idx=parseInt(card.getAttribute('data-area-idx'));
    openSteps(idx);
  };
}

function updateTotalProg(){
  var areas=getAreas(curMode);
  var total=0,done=0;
  areas.forEach(function(a){
    a.steps.forEach(function(s){
      total++;
      if(checks[curMode][s.id]&&checks[curMode][s.id].done)done++;
    });
  });
  var pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-lbl').textContent=
    selPerson?(selPerson+' · '+done+'/'+total+' 步驟完成'):'選擇人員後開始清潔';
  var btn=document.getElementById('submit-btn');
  var ready=done===total&&total>0&&!!selPerson;
  btn.style.background=ready?'var(--b)':'var(--bd)';
  btn.style.color=ready?'#fff':'var(--ink3)';
  btn.style.cursor=ready?'pointer':'not-allowed';
}

// ── 步驟執行頁 ─────────────────────────────────────────────
function openSteps(areaIdx){
  curAreaIdx=areaIdx;
  var area=curAreas[areaIdx];
  // 找到第一個未完成的步驟，或預設第0個
  var firstUndone=0;
  for(var i=0;i<area.steps.length;i++){
    if(!checks[curMode][area.steps[i].id]||!checks[curMode][area.steps[i].id].done){firstUndone=i;break;}
    if(i===area.steps.length-1)firstUndone=area.steps.length-1; // 全完成，停在最後
  }
  curStepIdx=firstUndone;
  showScreen('steps');
  renderSteps();
}

function renderSteps(){
  var area=curAreas[curAreaIdx];
  var steps=area.steps;
  var doneCount=steps.filter(function(s){return checks[curMode][s.id]&&checks[curMode][s.id].done;}).length;
  var pct=Math.round(doneCount/steps.length*100);
  document.getElementById('step-area-name').textContent=area.area;
  document.getElementById('step-progress-txt').textContent='第 '+(curStepIdx+1)+' / '+steps.length+' 步驟';
  document.getElementById('step-pct').textContent=pct+'%';

  // 進度點
  document.getElementById('step-dots').innerHTML=steps.map(function(s,i){
    var done=checks[curMode][s.id]&&checks[curMode][s.id].done;
    var cls=done?'done':i===curStepIdx?'current':'';
    return '<span class="step-dot '+cls+'"></span>';
  }).join('');

  // 步驟卡片列表（全部顯示，當前高亮）
  var html='';
  steps.forEach(function(s,i){
    var st=checks[curMode][s.id]||{done:false,note:''};
    var isDone=st.done;
    var isCur=i===curStepIdx;
    var cls='step-card'+(isDone?' done':isCur?' current-step':'');
    html+='<div class="'+cls+'" id="step-card-'+i+'">'
      +'<div class="step-num">'
        +'<span class="step-num-circle">'+(isDone?'✓':(i+1))+'</span>'
        +'步驟 '+(i+1)
      +'</div>'
      +'<div class="step-task">'+esc(s.task)+'</div>'
      +(s.tool?'<div class="step-tool">🔧 '+esc(s.tool)+'</div>':'')
      +(s.needNote?
        '<div class="note-section">'
          +'<div class="note-label">📝 '+(s.noteTip||'有異常請備注')+'</div>'
          +'<textarea class="note-inp" rows="2" placeholder="'+(s.noteTip||'請描述異常情況')+'" data-step-idx="'+i+'">'+(st.note||'')+'</textarea>'
        +'</div>'
      :'')
    +'</div>';
  });
  var body=document.getElementById('step-body');
  body.innerHTML=html;

  // 備注 change 事件委派
  body.onchange=function(e){
    var ta=e.target.closest('textarea[data-step-idx]');
    if(!ta)return;
    var idx=parseInt(ta.getAttribute('data-step-idx'));
    var s=steps[idx];
    if(!checks[curMode][s.id])checks[curMode][s.id]={done:false,note:''};
    checks[curMode][s.id].note=ta.value;
  };

  // 捲動到當前步驟
  setTimeout(function(){
    var card=document.getElementById('step-card-'+curStepIdx);
    if(card)card.scrollIntoView({behavior:'smooth',block:'center'});
  },100);

  // 更新底部按鈕
  updateStepBtn();
}

function updateStepBtn(){
  var area=curAreas[curAreaIdx];
  var steps=area.steps;
  var curStep=steps[curStepIdx];
  var isDone=checks[curMode][curStep.id]&&checks[curMode][curStep.id].done;
  var allAreaDone=steps.every(function(s){return checks[curMode][s.id]&&checks[curMode][s.id].done;});
  var isLastArea=curAreaIdx===curAreas.length-1;
  var isLastStep=curStepIdx===steps.length-1;
  var allTotalDone=curAreas.every(function(a){return a.steps.every(function(s){return checks[curMode][s.id]&&checks[curMode][s.id].done;});});
  var btn=document.getElementById('step-done-btn');

  if(allTotalDone){
    btn.textContent='🎉 全部完成！';btn.className='step-done-btn all-done';
  } else if(allAreaDone){
    if(isLastArea){btn.textContent='🎉 全部完成！';btn.className='step-done-btn all-done';}
    else{btn.textContent='下一區塊 →';btn.className='step-done-btn next-area';}
  } else if(isDone&&!isLastStep){
    btn.textContent='下一步驟 →';btn.className='step-done-btn confirm';
  } else if(!isDone){
    btn.textContent='✓ 完成此步驟';btn.className='step-done-btn confirm';
  } else {
    btn.textContent='✓ 完成此步驟';btn.className='step-done-btn confirm';
  }
}

function stepDone(){
  var area=curAreas[curAreaIdx];
  var steps=area.steps;
  var curStep=steps[curStepIdx];
  var allAreaDone=steps.every(function(s){return checks[curMode][s.id]&&checks[curMode][s.id].done;});
  var allTotalDone=curAreas.every(function(a){return a.steps.every(function(s){return checks[curMode][s.id]&&checks[curMode][s.id].done;});});
  var isLastArea=curAreaIdx===curAreas.length-1;

  if(allTotalDone){
    // 已全部完成，回到列表
    backToList();
    return;
  }

  if(allAreaDone){
    // 此區塊完成，跳下一區塊
    if(!isLastArea){
      curAreaIdx++;
      curStepIdx=0;
      renderSteps();
    } else {
      backToList();
    }
    return;
  }

  // 勾選當前步驟
  if(!checks[curMode][curStep.id])checks[curMode][curStep.id]={done:false,note:''};
  if(!checks[curMode][curStep.id].done){
    checks[curMode][curStep.id].done=true;
  }

  // 移到下一個未完成的步驟
  var next=curStepIdx+1;
  while(next<steps.length&&checks[curMode][steps[next].id]&&checks[curMode][steps[next].id].done){next++;}
  if(next<steps.length){curStepIdx=next;}
  else{curStepIdx=steps.length-1;} // 停在最後一個（顯示完成狀態）

  renderSteps();
  // 同步更新列表的進度
  updateTotalProg();
  renderAreaList();
}

function backToList(){
  showScreen('list');
  renderAreaList();
  updateTotalProg();
  // 自動捲到下一個未完成的區塊
  var nextUndoneIdx=-1;
  for(var i=0;i<curAreas.length;i++){
    var area=curAreas[i];
    var allDone=area.steps.every(function(s){return checks[curMode][s.id]&&checks[curMode][s.id].done;});
    if(!allDone){nextUndoneIdx=i;break;}
  }
}

// ── 提交 ─────────────────────────────────────────────────
function submitCleaning(){
  if(!selPerson){showToast('請先選擇人員');return;}
  var areas=getAreas(curMode);
  var total=0,done=0;
  areas.forEach(function(a){a.steps.forEach(function(s){total++;if(checks[curMode][s.id]&&checks[curMode][s.id].done)done++;});});
  if(done<total){showToast('還有 '+(total-done)+' 個步驟未完成');return;}
  var today=new Date(),d=today;
  var dateStr=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var recId=String(Date.now());
  var items=[];
  areas.forEach(function(a){
    a.steps.forEach(function(s){
      var st=checks[curMode][s.id]||{done:false,note:''};
      items.push({itemId:s.id,area:s.area,task:s.task,done:st.done,note:st.note||''});
    });
  });
  apiPost({action:'cleanRecordSave',recId:recId,date:dateStr,mode:curMode,person:selPerson,items:JSON.stringify(items)},function(d){
    if(d&&d.ok){
      checks[curMode]={};
      var modeLabel={daily:'日清潔',weekly:'週清潔',monthly:'月清潔'}[curMode];
      document.getElementById('done-sub').textContent=dateStr+' · '+selPerson+' · '+modeLabel+' '+items.length+' 步全部完成';
      document.getElementById('done-overlay').classList.add('show');
      renderAll();
    } else {showToast('❌ 儲存失敗，請重試');}
  });
}
function closeDone(){
  document.getElementById('done-overlay').classList.remove('show');
}

// ── 歷史記錄 ─────────────────────────────────────────────
function loadHist(){
  var mode=document.getElementById('hist-mode-sel').value;
  var month=document.getElementById('hist-month').value;
  var startDate='',endDate='';
  if(month){
    var parts=month.split('-');
    var y=parseInt(parts[0]),mo=parseInt(parts[1]);
    startDate=month+'-01';
    endDate=month+'-'+String(new Date(y,mo,0).getDate()).padStart(2,'0');
  }
  document.getElementById('hist-body').innerHTML='<div class="empty">載入中…</div>';
  api({action:'cleanRecordGetAll',mode:mode,startDate:startDate,endDate:endDate},function(d){
    if(!d||!d.ok||!d.data||!d.data.length){
      document.getElementById('hist-body').innerHTML='<div class="empty">此期間無清潔記錄</div>';return;
    }
    var modeL={daily:'日清潔',weekly:'週清潔',monthly:'月清潔'};
    var html='';
    d.data.forEach(function(rec,idx){
      var total=rec.items.length,done=rec.items.filter(function(i){return i.done;}).length;
      var pct=total?Math.round(done/total*100):0;
      // 依區塊分組顯示
      var areaGroups={};
      rec.items.forEach(function(item){
        if(!areaGroups[item.area])areaGroups[item.area]=[];
        areaGroups[item.area].push(item);
      });
      html+='<div class="hist-rec">'
        +'<div class="hist-head" onclick="toggleHist('+idx+')">'
          +'<div><div class="hist-date">'+rec.date+' '+(modeL[rec.mode]||rec.mode)+'</div>'
          +'<div class="hist-meta">'+rec.person+' · '+rec.submittedAt.slice(11,16)+'</div></div>'
          +'<span class="hist-rate '+(pct===100?'full':'partial')+'">'+done+'/'+total+'</span>'
        +'</div>'
        +'<div class="hist-body" id="hb-'+idx+'">';
      Object.keys(areaGroups).forEach(function(area){
        html+='<div class="hist-area"><div class="hist-area-name">'+area+'</div>';
        areaGroups[area].forEach(function(item){
          html+='<div class="hist-step"><span>'+(item.done?'✅':'⬜')+'</span>'
            +'<div><div>'+esc(item.task)+'</div>'+(item.note?'<div class="hist-note">📝 '+esc(item.note)+'</div>':'')+'</div></div>';
        });
        html+='</div>';
      });
      html+='</div></div>';
    });
    document.getElementById('hist-body').innerHTML=html;
  });
}
function toggleHist(idx){var el=document.getElementById('hb-'+idx);if(el)el.classList.toggle('open');}

// ── 設定 ─────────────────────────────────────────────────
// ── 設定子頁籤 ────────────────────────────────────────────
var curCfgSub = 'steps';
function switchCfgSub(sub){
  curCfgSub = sub;
  ['steps','areas','tools'].forEach(function(n){
    var panel = document.getElementById('cfg-sub-'+n);
    var tab   = document.getElementById('cst-'+n);
    if(panel) panel.style.display = n===sub ? 'block' : 'none';
    if(tab){
      tab.style.color = n===sub ? 'var(--b)' : 'var(--ink3)';
      tab.style.borderBottomColor = n===sub ? 'var(--b)' : 'transparent';
    }
  });
  if(sub==='steps') renderCfg();
  else if(sub==='areas') renderAreaLib();
  else if(sub==='tools') renderToolLib();
}

// ── 區塊庫管理 ────────────────────────────────────────────
function renderAreaLib(){
  var el = document.getElementById('area-lib-list');
  if(!cleanAreas.length){ el.innerHTML='<div class="empty">尚無區塊</div>'; return; }

  var toolOpts = '<option value="">（無）</option>'+cleanTools.map(function(t){return '<option>'+esc(t)+'</option>';}).join('');

function renderCfg(){
  var mode=document.getElementById('cfg-mode-sel').value;
  var areas=getAreas(mode);
  var body=document.getElementById('cfg-body');
  if(!areas.length){body.innerHTML='<div class="empty">此週期尚無項目</div>';return;}
  var html='';
  areas.forEach(function(a){
    html+='<div class="cfg-area-group">'
      +'<div class="cfg-area-head">'+esc(a.area)+' <span style="font-weight:400;font-size:12px">'+a.steps.length+' 步驟</span></div>';
    a.steps.forEach(function(s){
      var nn=s.needNote?'checked':'';
      html+='<div class="cfg-step-row" id="cfg-row-'+s.id+'">'
          +'<div class="cfg-step-info">'
            +'<div class="cfg-step-task">'+esc(s.task)+'</div>'
            +'<div class="cfg-step-meta">'+(s.tool?'🔧 '+esc(s.tool)+'　':'')+(s.needNote?'📝 需備注':'')+'</div>'
          +'</div>'
          +'<div style="display:flex;flex-shrink:0;gap:5px">'
            +'<button class="cfg-edit-btn" data-editid="'+s.id+'">編輯</button>'
            +'<button class="cfg-del-btn" data-delid="'+s.id+'">刪除</button>'
          +'</div>'
        +'</div>'
        // inline 編輯表單（預設隱藏）
        +'<div class="cfg-edit-form" id="cfg-form-'+s.id+'">'
          +'<div class="cfg-ef-row">'
            +'<div><div style="font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:3px">區塊</div>'
            +'<select class="cfg-ef-inp" id="ef-area-'+s.id+'">'
              +'<option value="">選擇區塊…</option>'
              +cleanAreas.map(function(a){return '<option'+(a===s.area?' selected':'')+'>'+esc(a)+'</option>';}).join('')
            +'</select></div>'
            +'<div><div style="font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:3px">使用器具</div>'
            +'<select class="cfg-ef-inp" id="ef-tool-'+s.id+'">'
              +'<option value="">（無）</option>'
              +cleanTools.map(function(t){return '<option'+(t===(s.tool||'')?'  selected':'')+'>'+esc(t)+'</option>';}).join('')
            +'</select></div>'
          +'</div>'
          +'<div style="font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:3px">步驟內容</div>'
          +'<textarea class="cfg-ef-inp" id="ef-task-'+s.id+'" rows="2" style="margin-bottom:8px">'+esc(s.task)+'</textarea>'
          +'<div class="cfg-ef-check">'
            +'<input type="checkbox" id="ef-nn-'+s.id+'" '+nn+'>'
            +'<label for="ef-nn-'+s.id+'" style="cursor:pointer">需要備注（有異常狀況時填寫）</label>'
          +'</div>'
          +'<div id="ef-tip-wrap-'+s.id+'" style="'+(s.needNote?'':'display:none')+'margin-bottom:8px">'
            +'<div style="font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:3px">備注提示文字</div>'
            +'<input class="cfg-ef-inp" id="ef-tip-'+s.id+'" value="'+esc(s.noteTip||'')+'" placeholder="如：有髒污請描述">'
          +'</div>'
          +'<div>'
            +'<button class="cfg-save-btn" data-saveid="'+s.id+'">儲存</button>'
            +'<button class="cfg-cancel-btn" data-cancelid="'+s.id+'">取消</button>'
          +'</div>'
        +'</div>';
    });
    html+='</div>';
  });
  body.innerHTML=html;

  // 需備注 checkbox 動態顯示 tip 欄位
  allItems.filter(function(i){return i.mode===document.getElementById('cfg-mode-sel').value;}).forEach(function(s){
    var nn=document.getElementById('ef-nn-'+s.id);
    if(nn){
      nn.onchange=function(){
        var tw=document.getElementById('ef-tip-wrap-'+s.id);
        if(tw)tw.style.display=this.checked?'block':'none';
      };
    }
  });

  body.onclick=function(e){
    // 編輯
    var editBtn=e.target.closest('[data-editid]');
    if(editBtn){
      var id=editBtn.getAttribute('data-editid');
      // 關閉其他所有編輯表單
      body.querySelectorAll('.cfg-edit-form.open').forEach(function(f){
        if(f.id!=='cfg-form-'+id)f.classList.remove('open');
      });
      var form=document.getElementById('cfg-form-'+id);
      if(form)form.classList.toggle('open');
      return;
    }
    // 取消
    var cancelBtn=e.target.closest('[data-cancelid]');
    if(cancelBtn){
      var form=document.getElementById('cfg-form-'+cancelBtn.getAttribute('data-cancelid'));
      if(form)form.classList.remove('open');
      return;
    }
    // 儲存
    var saveBtn=e.target.closest('[data-saveid]');
    if(saveBtn){
      var id=saveBtn.getAttribute('data-saveid');
      var item=allItems.find(function(i){return String(i.id)===String(id);});
      if(!item)return;
      var area=document.getElementById('ef-area-'+id).value.trim();
      var tool=document.getElementById('ef-tool-'+id).value.trim();
      var task=document.getElementById('ef-task-'+id).value.trim();
      var needNote=document.getElementById('ef-nn-'+id).checked;
      var noteTip=document.getElementById('ef-tip-'+id)?document.getElementById('ef-tip-'+id).value.trim():'';
      if(!area||!task){showToast('區塊名稱和步驟內容不能為空');return;}
      saveBtn.textContent='儲存中…';saveBtn.disabled=true;
      apiPost({
        action:'cleanItemSave',
        id:id, mode:item.mode, area:area, tool:tool, task:task,
        needNote:needNote?'true':'false', noteTip:noteTip, order:item.order||0
      },function(d){
        if(d&&d.ok){
          showToast('✓ 已儲存');
          syncItems();
        }else{
          showToast('儲存失敗');
          saveBtn.textContent='儲存';saveBtn.disabled=false;
        }
      });
      return;
    }
    // 刪除
    var delBtn=e.target.closest('[data-delid]');
    if(delBtn){
      if(!confirm('確定刪除此步驟？'))return;
      apiPost({action:'cleanItemDelete',id:delBtn.getAttribute('data-delid')},function(d){
        if(d&&d.ok){showToast('已刪除');syncItems();}else showToast('刪除失敗');
      });
    }
  };
}

function addCleanItem(){
  var area=document.getElementById('ni-area').value;
  var task=document.getElementById('ni-task').value.trim();
  if(!area||!task){showToast('請選擇區塊並填寫步驟內容');return;}
  var mode=document.getElementById('cfg-mode-sel').value;
  var tool=document.getElementById('ni-tool').value;
  var needNote=document.getElementById('ni-needNote').checked;
  var noteTip=document.getElementById('ni-notetip').value.trim();
  var maxOrder=allItems.filter(function(i){return i.mode===mode;}).reduce(function(m,i){return Math.max(m,i.order||0);},0);
  apiPost({action:'cleanItemSave',mode:mode,area:area,tool:tool,task:task,needNote:needNote?'true':'false',noteTip:noteTip,order:maxOrder+1},function(d){
    if(d&&d.ok){
      showToast('✓ 已新增');
      ['ni-area','ni-tool','ni-task','ni-notetip'].forEach(function(id){document.getElementById(id).value='';});
      document.getElementById('ni-needNote').checked=false;
      document.getElementById('ni-tip-wrap').style.display='none';
      syncItems();
    }else showToast('新增失敗');
  });
}

// ── 工具 ─────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function showToast(m){
  var t=document.getElementById('toast');
  t.textContent=m;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},2800);
}
