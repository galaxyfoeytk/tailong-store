<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="盤補貨">
<title>每日盤補貨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
:root{
  --b:#1A3A5C;--bl:#E8F0FA;--bm:#4A7CB5;
  --g:#1A6B3C;--gl:#E8F5EE;--gm:#3DA86A;
  --amber:#8A5500;--amberl:#FFF8E6;
  --red:#C0302A;--redl:#FDECEA;
  --purple:#5B2D8E;--purplel:#F3E8FF;
  --ink:#0F1923;--ink2:#3A4A5C;--ink3:#7A8A9C;--ink4:#C8D4DF;
  --bg:#EFF2F7;--white:#fff;--bd:#D4DCE8;
  --r:14px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:15px;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* 頂部 */
.topbar{background:linear-gradient(135deg,#1A3A5C,#2A5A8C);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-title{color:#fff;font-size:16px;font-weight:900}
.top-sub{color:rgba(255,255,255,.65);font-size:11px;margin-top:2px}
.home-btn{background:rgba(255,255,255,.18);border:none;color:#fff;font-size:13px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;font-family:inherit}

/* 頁面 */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;display:none;padding:14px 14px 32px}
.page.on{display:block}

/* 主選單 */
.mode-cards{display:flex;flex-direction:column;gap:14px;margin-top:8px}
.mode-card{background:var(--white);border-radius:16px;padding:22px;display:flex;align-items:center;gap:16px;cursor:pointer;border:2px solid var(--bd);transition:border-color .15s,box-shadow .15s}
.mode-card:active{transform:scale(.98)}
.mode-card.daily{border-color:#4A7CB5}
.mode-card.weekly{border-color:#5B2D8E}
.mode-icon{font-size:36px;flex-shrink:0;width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.mc-daily{background:#E8F0FA}
.mc-weekly{background:#F3E8FF}
.mode-info .mode-name{font-size:18px;font-weight:900;margin-bottom:4px}
.mode-info .mode-desc{font-size:13px;color:var(--ink3)}
.daily-clr{color:#1A3A5C}
.weekly-clr{color:#5B2D8E}

/* 開始設定頁 */
.setup-card{background:var(--white);border-radius:var(--r);border:1px solid var(--bd);padding:16px;margin-bottom:12px}
.setup-title{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.person-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.p-btn{padding:12px 6px;border-radius:var(--r2);border:2px solid var(--bd);background:var(--white);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink2);text-align:center;transition:all .12s}
.p-btn.on{background:var(--b);color:#fff;border-color:var(--b)}
.p-btn:active{opacity:.7}
.start-btn{width:100%;padding:15px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;margin-top:4px}
.start-daily{background:linear-gradient(135deg,#1A3A5C,#4A7CB5)}
.start-weekly{background:linear-gradient(135deg,#5B2D8E,#8B5DBE)}

/* 區塊選擇 */
.section-info{background:var(--white);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;border:1px solid var(--bd)}
.section-meta{font-size:13px;color:var(--ink3);display:flex;gap:16px;flex-wrap:wrap}
.section-meta span{font-weight:600;color:var(--ink)}
.zone-list{display:flex;flex-direction:column;gap:10px}
.zone-card{background:var(--white);border-radius:var(--r);padding:18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:2px solid var(--bd);transition:all .12s}
.zone-card:active{transform:scale(.98)}
.zone-card.done{border-color:var(--gm);background:var(--gl)}
.zone-card.daily-zone{border-left:4px solid var(--bm)}
.zone-card.weekly-zone{border-left:4px solid var(--purple)}
.zone-left{display:flex;align-items:center;gap:14px}
.zone-icon{font-size:28px}
.zone-name{font-size:16px;font-weight:700}
.zone-count{font-size:12px;color:var(--ink3);margin-top:3px}
.zone-status{font-size:13px;font-weight:700;color:var(--ink4)}
.zone-card.done .zone-status{color:var(--gm)}
.zone-arrow{font-size:20px;color:var(--ink4)}
.zone-card.done .zone-arrow{color:var(--gm)}

/* 品項填寫 */
.section-header{background:var(--white);border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.sh-icon{font-size:28px}
.sh-name{font-size:17px;font-weight:900}
.sh-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.item-list{display:flex;flex-direction:column;gap:8px}
.item-card{background:var(--white);border-radius:var(--r2);border:1.5px solid var(--bd);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .12s}
.item-card.filled{border-color:var(--gm);background:var(--gl)}
.item-card.need-restock{border-color:var(--amber);background:var(--amberl)}
.item-card.ok{border-color:var(--gm);background:var(--gl)}
.item-info{flex:1}
.item-name{font-size:14px;font-weight:600}
.item-threshold{font-size:11px;color:var(--ink3);margin-top:2px}
.item-result{text-align:right;flex-shrink:0}
.item-qty{font-size:16px;font-weight:900}
.item-restock{font-size:11px;margin-top:2px;font-weight:700}
.item-restock.need{color:var(--amber)}
.item-restock.ok{color:var(--gm)}
.confirm-zone-btn{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;margin-top:14px;background:linear-gradient(135deg,var(--g),var(--gm))}

/* 結果頁 */
.result-banner{border-radius:var(--r);padding:20px;text-align:center;margin-bottom:14px;color:#fff}
.rb-daily{background:linear-gradient(135deg,#1A3A5C,#4A7CB5)}
.rb-weekly{background:linear-gradient(135deg,#5B2D8E,#8B5DBE)}
.rb-icon{font-size:40px;margin-bottom:8px}
.rb-title{font-size:20px;font-weight:900;margin-bottom:4px}
.rb-meta{font-size:13px;opacity:.85}
.result-section{background:var(--white);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:10px;overflow:hidden}
.rs-head{padding:12px 14px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.rs-head.supply{background:#FFF8E6;color:var(--amber)}
.rs-head.ok{background:var(--gl);color:var(--g)}
.rs-item{padding:10px 14px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ri-name{font-size:14px;font-weight:600}
.ri-detail{font-size:12px;color:var(--ink3);margin-top:2px}
.ri-qty{font-size:16px;font-weight:900}
.ri-qty.supply{color:var(--amber)}
.ri-qty.order{color:var(--purple)}
.new-btn{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--white);color:var(--b);border:2px solid var(--b);margin-top:4px}

/* 數量輸入 overlay */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.sh{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:16px 16px 32px}
.sh-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 14px}
.sh-title{font-size:16px;font-weight:900;margin-bottom:4px}
.sh-threshold{font-size:12px;color:var(--ink3);margin-bottom:16px;padding:8px 12px;background:var(--bg);border-radius:var(--r2)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.num-display{font-size:36px;font-weight:900;text-align:center;padding:14px;background:var(--bg);border-radius:var(--r2);margin-bottom:12px;color:var(--ink);letter-spacing:2px;min-height:72px;display:flex;align-items:center;justify-content:center}
.nk{padding:16px;font-size:20px;font-weight:700;border:none;background:var(--white);border-radius:var(--r2);cursor:pointer;font-family:inherit;border:1.5px solid var(--bd)}
.nk:active{background:var(--bg)}
.nk.del{background:var(--redl);color:var(--red);border-color:#F5A0A0}
.nk.confirm{background:var(--g);color:#fff;border-color:var(--g);font-size:15px}
.nk.zero{grid-column:span 2}
.unit-hint{text-align:center;font-size:12px;color:var(--ink3);margin-bottom:8px}

/* 歷史記錄 overlay */
.hist-item{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start}
.hi-date{font-size:13px;font-weight:700}
.hi-meta{font-size:11px;color:var(--ink3);margin-top:2px}
.hi-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px}
.hi-daily{background:var(--bl);color:var(--b)}
.hi-weekly{background:var(--purplel);color:var(--purple)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0F1923;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:500;display:none;pointer-events:none;font-weight:500;white-space:nowrap}
.empty{text-align:center;color:var(--ink3);padding:32px;font-size:14px}
.progress-bar{height:6px;background:var(--bd);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s;background:var(--gm)}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="top-title">📋 盤補貨系統</div>
    <div class="top-sub">瀧飲山潮 · 學士店</div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="home-btn" onclick="showHist()">📂 記錄</button>
    <button class="home-btn" onclick="showSettings()">⚙️ 設定</button>
    <button class="home-btn" onclick="location.href='index.html'">🏠</button>
  </div>
</div>

<div class="pages">

  <!-- 主選單 -->
  <div class="page on" id="page-home">
    <div style="padding:8px 0 16px;font-size:15px;font-weight:700;color:var(--ink2)">請選擇盤點類型</div>
    <div class="mode-cards">
      <div class="mode-card daily" onclick="showSetup('daily')">
        <div class="mode-icon mc-daily">📅</div>
        <div class="mode-info">
          <div class="mode-name daily-clr">每日盤補貨</div>
          <div class="mode-desc">三區塊盤點 · 計算需補貨量<br>耗材 · 食材 · 冷凍</div>
        </div>
      </div>
      <div class="mode-card weekly" onclick="showSetup('weekly')">
        <div class="mode-icon mc-weekly">📆</div>
        <div class="mode-info">
          <div class="mode-name weekly-clr">每週盤叫貨</div>
          <div class="mode-desc">完整盤點 · 計算需叫貨量<br>耗材 · 食材 · 冷凍 · 茶葉原料</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 開始設定 -->
  <div class="page" id="page-setup">
    <div class="setup-card">
      <div class="setup-title">盤點人員</div>
      <div class="person-grid" id="person-grid"></div>
    </div>
    <div class="setup-card">
      <div class="setup-title">日期</div>
      <input type="date" id="setup-date" style="width:100%;padding:12px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:15px;font-family:inherit;outline:none">
    </div>
    <button class="start-btn" id="start-btn" onclick="startInventory()">開始盤點</button>
  </div>

  <!-- 區塊選擇 -->
  <div class="page" id="page-zones">
    <div class="section-info">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px" id="zone-mode-title"></div>
      <div class="section-meta">
        <div>日期：<span id="zm-date"></span></div>
        <div>人員：<span id="zm-person"></span></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="zone-progress" style="width:0%"></div></div>
    </div>
    <div class="zone-list" id="zone-list"></div>
    <button class="confirm-zone-btn" id="finish-all-btn" onclick="finishAll()" style="display:none">✓ 完成盤點，查看結果</button>
  </div>

  <!-- 品項填寫 -->
  <div class="page" id="page-items">
    <div class="section-header" id="item-section-header"></div>
    <div class="item-list" id="item-list"></div>
    <button class="confirm-zone-btn" id="confirm-zone-btn" onclick="confirmZone()">✓ 確認此區塊完成</button>
  </div>

  <!-- 結果頁 -->
  <div class="page" id="page-result">
    <div class="result-banner" id="result-banner">
      <div class="rb-icon" id="rb-icon"></div>
      <div class="rb-title" id="rb-title"></div>
      <div class="rb-meta" id="rb-meta"></div>
    </div>
    <div id="result-content"></div>
    <button class="new-btn" onclick="goHome()">← 返回主選單</button>
  </div>

</div><!-- /pages -->

<!-- 數量輸入 overlay -->
<div class="ov" id="ov-num">
  <div class="sh">
    <div class="sh-handle"></div>
    <div class="sh-title" id="num-title"></div>
    <div class="sh-threshold" id="num-threshold"></div>
    <div class="num-display" id="num-display">—</div>
    <div class="unit-hint" id="num-unit"></div>
    <div class="numpad">
      <button class="nk" onclick="nkPress('7')">7</button>
      <button class="nk" onclick="nkPress('8')">8</button>
      <button class="nk" onclick="nkPress('9')">9</button>
      <button class="nk" onclick="nkPress('4')">4</button>
      <button class="nk" onclick="nkPress('5')">5</button>
      <button class="nk" onclick="nkPress('6')">6</button>
      <button class="nk" onclick="nkPress('1')">1</button>
      <button class="nk" onclick="nkPress('2')">2</button>
      <button class="nk" onclick="nkPress('3')">3</button>
      <button class="nk zero" onclick="nkPress('0')">0</button>
      <button class="nk del" onclick="nkDel()">⌫</button>
    </div>
    <button class="nk confirm" style="width:100%;padding:16px" onclick="nkConfirm()">✓ 確認數量</button>
  </div>
</div>

<!-- 歷史記錄 overlay -->
<div class="ov" id="ov-hist">
  <div class="sh" style="max-height:85dvh;overflow-y:auto">
    <div class="sh-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:900">盤點記錄</div>
      <button onclick="closeOv('hist')" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink3)">✕</button>
    </div>
    <div id="hist-list"></div>
  </div>
</div>

<!-- 設定 overlay -->
<div class="ov" id="ov-settings">
  <div class="sh" style="max-height:92dvh;overflow-y:auto">
    <div class="sh-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:900">⚙️ 盤點設定</div>
      <button onclick="closeOv('settings')" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink3)">✕</button>
    </div>

    <!-- 權限提示 -->
    <div id="set-perm-warn" style="display:none;background:var(--redl);border-radius:var(--r2);padding:10px 12px;font-size:13px;color:var(--red);margin-bottom:12px;font-weight:600">
      🔒 僅店長以上權限可修改設定
    </div>

    <!-- 日盤/週盤 tab -->
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button id="set-tab-daily" onclick="switchSetTab('daily')"
        style="flex:1;padding:9px;border-radius:var(--r2);border:2px solid var(--bm);background:var(--b);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">日盤</button>
      <button id="set-tab-weekly" onclick="switchSetTab('weekly')"
        style="flex:1;padding:9px;border-radius:var(--r2);border:2px solid var(--bd);background:var(--white);color:var(--ink2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">週盤</button>
    </div>

    <!-- 區塊管理 -->
    <div style="font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">區塊管理</div>
    <div id="set-zone-tabs" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px"></div>

    <!-- 新增區塊（店長以上） -->
    <div id="add-zone-area" style="display:flex;gap:7px;margin-bottom:14px">
      <input id="new-zone-icon" placeholder="圖示(如🧴)" style="width:64px;padding:9px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:14px;font-family:inherit;outline:none;text-align:center">
      <input id="new-zone-name" placeholder="區塊名稱（如：備料區）" style="flex:1;padding:9px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:13px;font-family:inherit;outline:none">
      <button onclick="addNewZone()" style="padding:9px 12px;background:var(--b);color:#fff;border:none;border-radius:var(--r2);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">＋ 新增</button>
    </div>

    <div style="border-top:1px solid var(--bd);margin-bottom:14px"></div>

    <!-- 品項列表 -->
    <div id="set-items-area"></div>

    <!-- 新增品項（店長以上） -->
    <div id="add-item-area" style="background:var(--bg);border-radius:var(--r2);padding:12px;margin-top:10px">
      <div style="font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px">新增品項到此區塊</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><div style="font-size:11px;color:var(--ink3);margin-bottom:4px">品項名稱</div>
          <input id="new-item-name" placeholder="如：大吸管" style="width:100%;padding:9px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:13px;font-family:inherit;outline:none"></div>
        <div><div style="font-size:11px;color:var(--ink3);margin-bottom:4px">單位</div>
          <input id="new-item-unit" placeholder="如：包、條、罐" style="width:100%;padding:9px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:13px;font-family:inherit;outline:none"></div>
        <div><div style="font-size:11px;color:var(--ink3);margin-bottom:4px">低標數量</div>
          <input id="new-item-min" type="number" placeholder="如：2" style="width:100%;padding:9px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:13px;font-family:inherit;outline:none"></div>
        <div><div style="font-size:11px;color:var(--ink3);margin-bottom:4px">補至目標</div>
          <input id="new-item-target" type="number" placeholder="如：5" style="width:100%;padding:9px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:13px;font-family:inherit;outline:none"></div>
      </div>
      <button onclick="addNewItem()" style="width:100%;padding:11px;background:var(--g);color:#fff;border:none;border-radius:var(--r2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">＋ 新增品項</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
// Apps Script API
// ══════════════════════════════════════
var API_URL = 'https://script.google.com/macros/s/AKfycbxCl8Kk2rj083r4CEbaf4eB3uSPmDE5aNv-92KD-NTfbARMXTjjgxC9uVWcZfNQ54GG/exec';

function api(params, cb){
  if(!API_URL){ if(cb) cb(null,'未設定API'); return; }
  var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
  fetch(API_URL+'?'+qs)
    .then(function(r){return r.json();})
    .then(function(d){if(cb)cb(d,null);})
    .catch(function(e){if(cb)cb(null,e.toString());});
}

// ══════════════════════════════════════
// 品項資料（日盤）— 4區塊
// ══════════════════════════════════════
var ZONES_DAILY = [
  {

// ══════════════════════════════════════
// 狀態
// ══════════════════════════════════════
var mode = 'daily'; // 'daily' | 'weekly'
var selPerson = '';
var curZoneId = '';
var currentZones = [];
var zoneData = {}; // {zoneId: {itemId: qty}}
var zoneDone = {}; // {zoneId: true}
var npStr = '';
var npItemId = '';
var npZoneId = '';
var records = [];

function loadRecords(){
  try{ records=JSON.parse(localStorage.getItem('inv_records')||'[]'); }catch(e){ records=[]; }
}
function saveRecords(){
  try{ localStorage.setItem('inv_records',JSON.stringify(records.slice(0,100))); }catch(e){}
}

// ══════════════════════════════════════
// 流程
// ══════════════════════════════════════
window.onload = function(){
  loadRecords();
  loadCustomItems();
  document.getElementById('setup-date').value = todayStr();
  buildPersonGrid();
};

function showSetup(m){
  mode = m;
  currentZones = m==='daily' ? ZONES_DAILY : ZONES_WEEKLY;
  zoneData = {}; zoneDone = {};
  currentZones.forEach(function(z){ zoneData[z.id]={}; });
  document.getElementById('start-btn').className = 'start-btn ' + (m==='daily'?'start-daily':'start-weekly');
  document.getElementById('start-btn').textContent = m==='daily'?'▶ 開始日盤':'▶ 開始週盤';
  showPage('setup');
}

function buildPersonGrid(){
  document.getElementById('person-grid').innerHTML = PERSONS.map(function(p){
    return '<button class="p-btn'+(p===selPerson?' on':'')+'" onclick="pickPerson(\''+p+'\')" >'+p+'</button>';
  }).join('');
}
function pickPerson(p){ selPerson=p; buildPersonGrid(); }

function startInventory(){
  if(!selPerson){ showToast('請選擇盤點人員'); return; }
  var date = document.getElementById('setup-date').value;
  if(!date){ showToast('請選擇日期'); return; }
  showPage('zones');
  buildZoneList();
}

function buildZoneList(){
  var modeLabel = mode==='daily'?'每日盤補貨':'每週盤叫貨';
  document.getElementById('zone-mode-title').textContent = modeLabel;
  document.getElementById('zm-date').textContent = document.getElementById('setup-date').value;
  document.getElementById('zm-person').textContent = selPerson;

  var done = Object.keys(zoneDone).length;
  var total = currentZones.length;
  document.getElementById('zone-progress').style.width = (done/total*100)+'%';

  document.getElementById('zone-list').innerHTML = currentZones.map(function(z){
    var isDone = zoneDone[z.id];
    var filled = Object.keys(zoneData[z.id]||{}).length;
    return '<div class="zone-card '+(mode==='daily'?'daily-zone':'weekly-zone')+(isDone?' done':'')+'" onclick="openZone(\''+z.id+'\')">'
      +'<div class="zone-left">'
        +'<div class="zone-icon">'+z.icon+'</div>'
        +'<div><div class="zone-name">'+z.name+'</div>'
          +'<div class="zone-count">'+z.items.length+'個品項'+(filled>0?' · 已填'+filled+'項':'')+'</div>'
        +'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:10px">'
        +'<span class="zone-status">'+(isDone?'✓ 完成':'未完成')+'</span>'
        +'<span class="zone-arrow">›</span>'
      +'</div>'
    +'</div>';
  }).join('');

  // 全部完成才顯示完成按鈕
  var allDone = currentZones.every(function(z){ return zoneDone[z.id]; });
  document.getElementById('finish-all-btn').style.display = allDone?'block':'none';
}

function openZone(zoneId){
  curZoneId = zoneId;
  var zone = currentZones.find(function(z){ return z.id===zoneId; });
  if(!zone) return;
  document.getElementById('item-section-header').innerHTML =
    '<div class="sh-icon">'+zone.icon+'</div>'
    +'<div><div class="sh-name">'+zone.name+'</div>'
    +'<div class="sh-sub">點選品項輸入現有數量</div></div>';
  buildItemList(zone);
  showPage('items');
}

function buildItemList(zone){
  var data = zoneData[zone.id]||{};
  document.getElementById('item-list').innerHTML = zone.items.map(function(item){
    var qty = data[item.id];
    var filled = qty !== undefined && qty !== null;
    var needRestock = filled && parseFloat(qty) < item.minVal;
    var cls = !filled ? '' : (needRestock ? 'need-restock' : 'ok');
    var restock = '';
    if(filled){
      var diff = item.targetVal - parseFloat(qty);
      if(diff > 0) restock = '<div class="item-restock need">需補：'+(mode==='daily'?'補':'叫')+diff+item.unit+'</div>';
      else restock = '<div class="item-restock ok">✓ 足夠</div>';
    }
    return '<div class="item-card '+cls+'" onclick="openNumpad(\''+zone.id+'\',\''+item.id+'\')">'
      +'<div class="item-info">'
        +'<div class="item-name">'+item.name+'</div>'
        +'<div class="item-threshold">低於 '+item.min+' 需補 → 補至 '+item.target+'</div>'
      +'</div>'
      +'<div class="item-result">'
        +'<div class="item-qty">'+(filled?qty+'<span style="font-size:12px;color:var(--ink3)">'+item.unit+'</span>':'—')+'</div>'
        +restock
      +'</div>'
    +'</div>';
  }).join('');
}

function confirmZone(){
  var zone = currentZones.find(function(z){ return z.id===curZoneId; });
  var data = zoneData[curZoneId]||{};
  var unfilled = zone.items.filter(function(item){ return data[item.id]===undefined; });
  if(unfilled.length>0){
    if(!confirm('還有 '+unfilled.length+' 項未填寫，確定完成此區塊嗎？')){ return; }
  }
  zoneDone[curZoneId] = true;
  showPage('zones');
  buildZoneList();
  showToast('✓ '+zone.name+'區塊已確認');
}

function finishAll(){
  var date = document.getElementById('setup-date').value;
  var rec = {
    id: Date.now(),
    mode: mode,
    date: date,
    person: selPerson,
    createdAt: nowStr(),
    zones: JSON.parse(JSON.stringify(zoneData))
  };
  records.unshift(rec);
  saveRecords();
  // 推送到 Sheets
  pushToSheets(rec);
  showResult(rec);
}

function pushToSheets(rec){
  // 整理所有需補/叫貨項目
  var supplyItems = [];
  currentZones.forEach(function(zone){
    var data = rec.zones[zone.id]||{};
    zone.items.forEach(function(item){
      var qty = data[item.id];
      if(qty===undefined) return;
      var diff = item.targetVal - parseFloat(qty);
      supplyItems.push({
        zone:zone.name, item:item.name, unit:item.unit,
        current:qty, target:item.targetVal, need:diff>0?diff:0
      });
    });
  });
  api({
    action: 'invSave',
    mode: rec.mode,
    date: rec.date,
    person: rec.person,
    createdAt: rec.createdAt,
    data: JSON.stringify(supplyItems)
  }, function(d,e){
    if(d&&d.ok) showToast('✓ 已同步至 Google Sheets');
  });
}

function showResult(rec){
  var isDaily = rec.mode==='daily';
  document.getElementById('result-banner').className = 'result-banner ' + (isDaily?'rb-daily':'rb-weekly');
  document.getElementById('rb-icon').textContent = isDaily?'📋':'📦';
  document.getElementById('rb-title').textContent = isDaily?'今日補貨清單':'本週叫貨清單';
  document.getElementById('rb-meta').textContent = rec.date+' · '+rec.person;

  var supplyItems = [], okItems = [];
  currentZones.forEach(function(zone){
    var data = rec.zones[zone.id]||{};
    zone.items.forEach(function(item){
      var qty = data[item.id];
      if(qty===undefined) return;
      var diff = item.targetVal - parseFloat(qty);
      if(diff>0) supplyItems.push({zone:zone.name,zone_icon:zone.icon,item:item.name,unit:item.unit,current:qty,need:diff});
      else okItems.push({zone:zone.name,item:item.name,unit:item.unit,current:qty});
    });
  });

  var html = '';
  if(supplyItems.length){
    var actionWord = isDaily?'需補貨':'需叫貨';
    html += '<div class="result-section">'
      +'<div class="rs-head supply">⚠ '+actionWord+' — '+supplyItems.length+' 項</div>'
      +supplyItems.map(function(r){
        return '<div class="rs-item">'
          +'<div><div class="ri-name">'+r.zone_icon+' '+r.item+'</div>'
            +'<div class="ri-detail">現有：'+r.current+r.unit+' · 需達：'+r.need+r.unit+'以上</div></div>'
          +'<div class="ri-qty '+(isDaily?'supply':'order')+'">+'+r.need+' '+r.unit+'</div>'
        +'</div>';
      }).join('')
    +'</div>';
  } else {
    html += '<div class="result-section"><div class="rs-head ok">✅ 所有品項庫存充足，無需補貨</div></div>';
  }

  if(okItems.length){
    html += '<div class="result-section">'
      +'<div class="rs-head ok">✓ 庫存足夠 — '+okItems.length+' 項</div>'
      +okItems.map(function(r){
        return '<div class="rs-item">'
          +'<div class="ri-name">'+r.item+'</div>'
          +'<div class="ri-qty" style="color:var(--gm)">'+r.current+' '+r.unit+'</div>'
        +'</div>';
      }).join('')
    +'</div>';
  }

  document.getElementById('result-content').innerHTML = html;
  showPage('result');
}

// ══════════════════════════════════════
// 數字鍵盤
// ══════════════════════════════════════
function openNumpad(zoneId, itemId){
  curZoneId = zoneId;
  npZoneId = zoneId;
  npItemId = itemId;
  var zone = currentZones.find(function(z){ return z.id===zoneId; });
  var item = zone.items.find(function(i){ return i.id===itemId; });
  npStr = zoneData[zoneId][itemId]!==undefined ? String(zoneData[zoneId][itemId]) : '';
  document.getElementById('num-title').textContent = item.name;
  document.getElementById('num-threshold').textContent =
    '📌 低於 '+item.min+' 需'+(mode==='daily'?'補':'叫')+'　→　補至 '+item.target;
  document.getElementById('num-unit').textContent = '單位：'+item.unit;
  updateNpDisplay();
  openOv('num');
}
function nkPress(v){
  if(npStr.length>=6) return;
  if(v==='.'&&npStr.includes('.')) return;
  if(npStr==='0'&&v!=='.') npStr=v;
  else npStr+=v;
  updateNpDisplay();
}
function nkDel(){ npStr=npStr.slice(0,-1); updateNpDisplay(); }
function updateNpDisplay(){
  document.getElementById('num-display').textContent = npStr||'—';
}
function nkConfirm(){
  if(npStr==='') return;
  var qty = parseFloat(npStr);
  if(isNaN(qty)){ showToast('請輸入有效數字'); return; }
  zoneData[npZoneId][npItemId] = qty;
  closeOv('num');
  var zone = currentZones.find(function(z){ return z.id===npZoneId; });
  buildItemList(zone);
}

// ══════════════════════════════════════
// 歷史記錄
// ══════════════════════════════════════
function showHist(){
  loadRecords();
  var el = document.getElementById('hist-list');
  if(!records.length){ el.innerHTML='<div class="empty">尚無盤點記錄</div>'; openOv('hist'); return; }
  el.innerHTML = records.slice(0,30).map(function(r){
    var label = r.mode==='daily'?'日盤':'週盤';
    var cls = r.mode==='daily'?'hi-daily':'hi-weekly';
    // 計算需補項數
    var needCount = 0;
    currentZones.forEach(function(zone){
      var data = (r.zones&&r.zones[zone.id])||{};
      zone.items.forEach(function(item){
        var qty=data[item.id];
        if(qty!==undefined && item.targetVal-parseFloat(qty)>0) needCount++;
      });
    });
    return '<div class="hist-item">'
      +'<div><div class="hi-date">'+r.date+'</div>'
        +'<div class="hi-meta">'+r.person+' · '+r.createdAt.slice(11,16)+'　需補/叫：'+needCount+'項</div></div>'
      +'<span class="hi-badge '+cls+'">'+label+'</span>'
    +'</div>';
  }).join('');
  openOv('hist');
}

// ══════════════════════════════════════
// 品項 & 區塊設定管理
// ══════════════════════════════════════
var setMode = 'daily';
var setZoneId = '';

// 從 localStorage 讀取登入者（由 index.html 的 sessionStorage 傳入）
function getLocalUser(){
  try{
    var u=sessionStorage.getItem('tw_user');
    return u?JSON.parse(u):null;
  }catch(e){ return null; }
}
function canEditSettings(){
  var u=getLocalUser();
  // 店長(3)以上可修改，未登入也允許（直接開 inventory.html 時）
  if(!u) return true;
  return parseInt(u.role)<=3;
}

function loadCustomItems(){
  try{
    var d=localStorage.getItem('inv_custom');
    if(d){
      var obj=JSON.parse(d);
      if(obj.daily) obj.daily.forEach(function(savedZone){
        var z=ZONES_DAILY.find(function(x){return x.id===savedZone.id;});
        if(z){ z.name=savedZone.name; z.icon=savedZone.icon; z.items=savedZone.items; }
      });
      if(obj.weekly) obj.weekly.forEach(function(savedZone){
        var z=ZONES_WEEKLY.find(function(x){return x.id===savedZone.id;});
        if(z){ z.name=savedZone.name; z.icon=savedZone.icon; z.items=savedZone.items; }
      });
      // 還原自訂新增的區塊
      if(obj.daily_extra){
        obj.daily_extra.forEach(function(z){
          if(!ZONES_DAILY.find(function(x){return x.id===z.id;})) ZONES_DAILY.push(z);
        });
      }
      if(obj.weekly_extra){
        obj.weekly_extra.forEach(function(z){
          if(!ZONES_WEEKLY.find(function(x){return x.id===z.id;})) ZONES_WEEKLY.push(z);
        });
      }
    }
  }catch(e){}
}

function saveCustomItems(){
  var obj={
    daily: ZONES_DAILY.map(function(z){return {id:z.id,name:z.name,icon:z.icon,items:z.items};}),
    weekly: ZONES_WEEKLY.map(function(z){return {id:z.id,name:z.name,icon:z.icon,items:z.items};}),
  };
  localStorage.setItem('inv_custom',JSON.stringify(obj));
}

function showSettings(){
  var canEdit=canEditSettings();
  document.getElementById('set-perm-warn').style.display=canEdit?'none':'block';
  document.getElementById('add-zone-area').style.display=canEdit?'flex':'none';
  document.getElementById('add-item-area').style.display=canEdit?'block':'none';
  setMode='daily';
  setZoneId=ZONES_DAILY[0]?ZONES_DAILY[0].id:'';
  renderSetTabs();
  renderSetZoneTabs();
  renderSetItems();
  openOv('settings');
}
function openSettings(){ showSettings(); }

function switchSetTab(m){
  setMode=m;
  var zones=m==='daily'?ZONES_DAILY:ZONES_WEEKLY;
  setZoneId=zones[0]?zones[0].id:'';
  renderSetTabs();
  renderSetZoneTabs();
  renderSetItems();
}
function renderSetTabs(){
  var m=setMode;
  var sd=document.getElementById('set-tab-daily');
  var sw=document.getElementById('set-tab-weekly');
  sd.style.background=m==='daily'?'var(--b)':'var(--white)';
  sd.style.color=m==='daily'?'#fff':'var(--ink2)';
  sd.style.borderColor=m==='daily'?'var(--bm)':'var(--bd)';
  sw.style.background=m==='weekly'?'var(--purple)':'var(--white)';
  sw.style.color=m==='weekly'?'#fff':'var(--ink2)';
  sw.style.borderColor=m==='weekly'?'var(--purple)':'var(--bd)';
}

function renderSetZoneTabs(){
  var zones=setMode==='daily'?ZONES_DAILY:ZONES_WEEKLY;
  var canEdit=canEditSettings();
  document.getElementById('set-zone-tabs').innerHTML=zones.map(function(z){
    var on=z.id===setZoneId;
    return '<div style="display:flex;align-items:center;gap:4px">'
      +'<button onclick="pickSetZone(\''+z.id+'\')" style="padding:7px 12px;border-radius:20px;border:1.5px solid '+(on?'var(--g)':'var(--bd)')+';background:'+(on?'var(--g)':'var(--white)')+';color:'+(on?'#fff':'var(--ink2)')+';font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">'+z.icon+' '+z.name+'</button>'
      +(canEdit?'<button onclick="delZone(\''+z.id+'\')" style="padding:3px 6px;border-radius:6px;border:none;background:var(--redl);color:var(--red);font-size:11px;cursor:pointer;font-family:inherit">✕</button>':'')
    +'</div>';
  }).join('');
}
function pickSetZone(id){ setZoneId=id; renderSetZoneTabs(); renderSetItems(); }

function addNewZone(){
  var icon=document.getElementById('new-zone-icon').value.trim()||'📦';
  var name=document.getElementById('new-zone-name').value.trim();
  if(!name){ showToast('請填寫區塊名稱'); return; }
  var zones=setMode==='daily'?ZONES_DAILY:ZONES_WEEKLY;
  var id='zone_'+Date.now();
  zones.push({id:id, name:name, icon:icon, items:[]});
  setZoneId=id;
  document.getElementById('new-zone-icon').value='';
  document.getElementById('new-zone-name').value='';
  saveCustomItems();
  renderSetZoneTabs();
  renderSetItems();
  showToast('✓ 已新增區塊：'+name);
}

function delZone(id){
  var zones=setMode==='daily'?ZONES_DAILY:ZONES_WEEKLY;
  // 預設區塊不能刪
  var defaultIds=['counter','consumable','refrigerated','ingredient','tea_material'];
  if(defaultIds.indexOf(id)>-1){ showToast('預設區塊無法刪除'); return; }
  if(!confirm('確定刪除此區塊及其所有品項？')) return;
  var idx=zones.findIndex(function(z){return z.id===id;});
  if(idx>-1) zones.splice(idx,1);
  setZoneId=zones[0]?zones[0].id:'';
  saveCustomItems();
  renderSetZoneTabs();
  renderSetItems();
  showToast('已刪除區塊');
}

function renderSetItems(){
  var zones=setMode==='daily'?ZONES_DAILY:ZONES_WEEKLY;
  var zone=zones.find(function(z){return z.id===setZoneId;});
  var canEdit=canEditSettings();
  if(!zone){
    document.getElementById('set-items-area').innerHTML='<div class="empty">請先選擇或新增區塊</div>';
    return;
  }
  if(!zone.items.length){
    document.getElementById('set-items-area').innerHTML='<div style="font-size:13px;color:var(--ink3);padding:12px 0">此區塊尚無品項，請在下方新增</div>';
    return;
  }
  document.getElementById('set-items-area').innerHTML=
    '<div style="font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">'+zone.icon+' '+zone.name+' — '+zone.items.length+' 項</div>'
    +zone.items.map(function(item,idx){
      return '<div style="background:var(--white);border:1.5px solid var(--bd);border-radius:var(--r2);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">'
        +'<div style="flex:1">'
          +'<div style="font-size:14px;font-weight:600">'+item.name+'</div>'
          +'<div style="font-size:11px;color:var(--ink3);margin-top:2px">低標：'+item.min+'　→　補至：'+item.target+'　（'+item.unit+'）</div>'
        +'</div>'
        +(canEdit?'<button onclick="delSetItem(\''+zone.id+'\','+idx+')" style="margin-left:10px;padding:5px 10px;border:1px solid #F5A0A0;border-radius:6px;background:var(--redl);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0">刪除</button>':'')
      +'</div>';
    }).join('');
}

function delSetItem(zoneId, idx){
  if(!confirm('確定刪除？')) return;
  var zones=setMode==='daily'?ZONES_DAILY:ZONES_WEEKLY;
  var zone=zones.find(function(z){return z.id===zoneId;});
  if(!zone) return;
  zone.items.splice(idx,1);
  saveCustomItems();
  renderSetItems();
  showToast('已刪除');
}

function addNewItem(){
  var name=document.getElementById('new-item-name').value.trim();
  var unit=document.getElementById('new-item-unit').value.trim();
  var minV=document.getElementById('new-item-min').value;
  var targetV=document.getElementById('new-item-target').value;
  if(!name||!unit){ showToast('請填寫品項名稱和單位'); return; }
  if(minV===''||targetV===''){ showToast('請填寫低標和目標數量'); return; }
  var zones=setMode==='daily'?ZONES_DAILY:ZONES_WEEKLY;
  var zone=zones.find(function(z){return z.id===setZoneId;});
  if(!zone){ showToast('請先選擇區塊'); return; }
  var newItem={
    id:'c_'+Date.now(),
    name:name, unit:unit,
    min:minV+unit, target:targetV+unit,
    minVal:parseFloat(minV)||0,
    targetVal:parseFloat(targetV)||0
  };
  zone.items.push(newItem);
  saveCustomItems();
  document.getElementById('new-item-name').value='';
  document.getElementById('new-item-unit').value='';
  document.getElementById('new-item-min').value='';
  document.getElementById('new-item-target').value='';
  renderSetItems();
  showToast('✓ 已新增：'+name);
}

function showPage(p){
  document.querySelectorAll('.page').forEach(function(el){ el.classList.remove('on'); });
  document.getElementById('page-'+p).classList.add('on');
}
function goHome(){
  zoneData={}; zoneDone={}; selPerson='';
  buildPersonGrid();
  showPage('home');
}
function openOv(id){ document.getElementById('ov-'+id).classList.add('show'); }
function closeOv(id){ document.getElementById('ov-'+id).classList.remove('show'); }
document.addEventListener('click',function(e){
  document.querySelectorAll('.ov.show').forEach(function(ov){ if(e.target===ov) ov.classList.remove('show'); });
});
function todayStr(){ var d=new Date(),p=function(n){return String(n).padStart(2,'0');}; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function nowStr(){ var d=new Date(),p=function(n){return String(n).padStart(2,'0');}; return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); }
function showToast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._t); t._t=setTimeout(function(){ t.style.display='none'; },2800); }
</script>
