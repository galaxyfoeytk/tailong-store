<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>盤點系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
:root{
  --b:#1A3A5C;--bl:#E8F0FA;--bm:#4A7CB5;
  --g:#1A6B3C;--gl:#E8F5EE;--gm:#3DA86A;
  --amber:#C07000;--amberl:#FFF3D0;
  --red:#C0302A;--redl:#FDECEA;
  --purple:#5B2D8E;--purplel:#F3E8FF;
  --ink:#0F1923;--ink2:#3A4A5C;--ink3:#7A8A9C;--ink4:#C8D4DF;
  --bg:#EFF2F7;--white:#fff;--bd:#D4DCE8;
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* 頂部 */
.topbar{background:linear-gradient(135deg,#1A3A5C,#2A5A8C);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-title{color:#fff;font-size:15px;font-weight:900}
.top-sub{color:rgba(255,255,255,.6);font-size:11px;margin-top:1px}
.tib{background:rgba(255,255,255,.18);border:none;color:#fff;font-size:12px;font-weight:600;padding:6px 10px;border-radius:16px;cursor:pointer;font-family:inherit;white-space:nowrap}
.tib:active{opacity:.7}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;display:none;padding:12px 12px 40px}
.page.on{display:block}

/* 模式卡片 */
.mode-cards{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.mode-card{background:var(--white);border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;border:2px solid var(--bd);transition:transform .1s}
.mode-card:active{transform:scale(.98)}
.mc-daily{border-color:var(--bm)}
.mc-weekly{border-color:var(--purple)}
.mc-monthly{border-color:var(--gm)}
.mc-icon{font-size:30px;width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mc-icon-daily{background:var(--bl)}
.mc-icon-weekly{background:var(--purplel)}
.mc-icon-monthly{background:var(--gl)}
.mc-name{font-size:16px;font-weight:900}
.mc-desc{font-size:12px;color:var(--ink3);margin-top:3px}
.mc-daily .mc-name{color:var(--b)}
.mc-weekly .mc-name{color:var(--purple)}
.mc-monthly .mc-name{color:var(--g)}

/* 設定頁 */
.setup-card{background:var(--white);border-radius:var(--r);border:1px solid var(--bd);padding:14px;margin-bottom:10px}
.slbl{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.pb{padding:10px 4px;border-radius:var(--r2);border:1.5px solid var(--bd);background:var(--white);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink2);text-align:center}
.pb.on{background:var(--b);color:#fff;border-color:var(--b)}
.pb:active{opacity:.7}
.date-inp{width:100%;padding:11px 12px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:15px;font-family:inherit;outline:none;color:var(--ink)}
.date-inp:focus{border-color:var(--bm)}
.start-btn{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff}
.start-daily{background:linear-gradient(135deg,var(--b),var(--bm))}
.start-weekly{background:linear-gradient(135deg,#5B2D8E,#8B5DBE)}
.start-monthly{background:linear-gradient(135deg,var(--g),var(--gm))}

/* 進度 */
.prog-wrap{background:var(--white);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;border:1px solid var(--bd)}
.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-info{font-size:13px;font-weight:700}
.prog-pct{font-size:18px;font-weight:900;color:var(--b)}
.prog-bar{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s;background:linear-gradient(90deg,var(--bm),var(--gm))}

/* 品項卡 */
.cat-lbl{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 6px;display:flex;align-items:center;gap:6px}
.cat-cnt{background:var(--bl);color:var(--b);padding:2px 7px;border-radius:7px;font-size:10px}
.item-card{background:var(--white);border-radius:var(--r2);border:1.5px solid var(--bd);padding:11px 13px;margin-bottom:6px;cursor:pointer;transition:border-color .12s,background .12s}
.item-card.filled-ok{border-color:var(--gm);background:var(--gl)}
.item-card.filled-low{border-color:var(--red);background:var(--redl)}
.item-card.filled-zero{border-color:var(--amber);background:var(--amberl)}
.ic-top{display:flex;align-items:center;justify-content:space-between}
.ic-name{font-size:14px;font-weight:600}
.ic-total{font-size:16px;font-weight:900;color:var(--ink3)}
.ic-total.ok{color:var(--g)}
.ic-total.low{color:var(--red)}
.ic-total.zero{color:var(--amber)}
.ic-sub{font-size:11px;color:var(--ink3);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
.ic-threshold{color:var(--red);font-weight:600}
.ic-units-row{font-size:11px;color:var(--ink2);margin-top:3px}

/* 完成按鈕 */
.finish-btn{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;margin-top:12px}
.fb-daily{background:linear-gradient(135deg,var(--b),var(--bm))}
.fb-weekly{background:linear-gradient(135deg,#5B2D8E,#8B5DBE)}
.fb-monthly{background:linear-gradient(135deg,var(--g),var(--gm))}

/* 結果頁 */
.result-banner{border-radius:var(--r);padding:16px;text-align:center;color:#fff;margin-bottom:12px}
.rb-daily{background:linear-gradient(135deg,var(--b),var(--bm))}
.rb-weekly{background:linear-gradient(135deg,#5B2D8E,#8B5DBE)}
.rb-monthly{background:linear-gradient(135deg,var(--g),var(--gm))}
.rb-icon{font-size:36px;margin-bottom:6px}
.rb-title{font-size:18px;font-weight:900;margin-bottom:4px}
.rb-sub{font-size:12px;opacity:.8}
.result-section{background:var(--white);border-radius:var(--r);border:1px solid var(--bd);margin-bottom:10px;overflow:hidden}
.rs-head{padding:10px 13px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.rs-head.action{background:var(--amberl);color:var(--amber)}
.rs-head.red{background:var(--redl);color:var(--red)}
.rs-head.ok{background:var(--gl);color:var(--g)}
.rs-head.info{background:var(--bl);color:var(--b)}
.rs-row{padding:10px 13px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.rs-name{font-size:14px;font-weight:600}
.rs-detail{font-size:11px;color:var(--ink3);margin-top:2px}
.rs-qty{font-size:15px;font-weight:900}
.rs-qty.action{color:var(--amber)}
.rs-qty.red{color:var(--red)}
.rs-qty.ok{color:var(--g)}
.rs-qty.info{color:var(--b)}
.new-btn{width:100%;padding:14px;background:var(--white);color:var(--b);border:2px solid var(--b);border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px}

/* 數量輸入 overlay */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:300;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.sh{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:540px;padding:14px 14px 32px;max-height:92dvh;overflow-y:auto}
.sh-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 12px}
.sh-title{font-size:16px;font-weight:900;margin-bottom:4px}
.sh-hint{font-size:12px;color:var(--ink3);background:var(--bg);border-radius:var(--r2);padding:8px 11px;margin-bottom:14px;line-height:1.6}
.unit-row{display:grid;grid-template-columns:70px 1fr 50px;gap:8px;align-items:center;margin-bottom:8px}
.ur-lbl{font-size:12px;font-weight:700;color:var(--ink3);text-align:right}
.ur-inp{padding:13px 10px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:20px;font-weight:700;text-align:center;font-family:inherit;color:var(--ink);outline:none;width:100%}
.ur-inp:focus{border-color:var(--bm)}
.ur-unit{font-size:13px;font-weight:600;color:var(--ink2)}
.total-row{background:var(--gl);border-radius:var(--r2);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.tr-lbl{font-size:12px;font-weight:700;color:var(--g)}
.tr-val{font-size:22px;font-weight:900;color:var(--g)}
.sh-ok{width:100%;padding:14px;background:linear-gradient(135deg,var(--b),var(--bm));color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.sh-ok:active{opacity:.8}

/* 設定 overlay */
.cfg-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.cfg-tab{padding:7px 12px;border-radius:16px;border:1.5px solid var(--bd);background:var(--white);color:var(--ink2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.cfg-tab.on-daily{background:var(--b);color:#fff;border-color:var(--b)}
.cfg-tab.on-weekly{background:var(--purple);color:#fff;border-color:var(--purple)}
.cfg-tab.on-monthly{background:var(--g);color:#fff;border-color:var(--g)}
.cfg-item-row{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:10px 12px;margin-bottom:6px}
.cir-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cir-name{font-size:14px;font-weight:700}
.cir-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px}
.cir-field{display:flex;flex-direction:column;gap:3px}
.cfl{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.04em}
.cf-inp{padding:8px;border:1.5px solid var(--bd);border-radius:6px;font-size:13px;font-family:inherit;background:var(--white);color:var(--ink);outline:none;width:100%}
.cf-inp:focus{border-color:var(--bm)}
.cir-conv{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink3);flex-wrap:wrap;margin-top:4px}
.cir-conv-block{background:var(--bg);border-radius:var(--r2);padding:9px 11px;margin-top:6px;border:1px solid var(--bd)}
.cir-conv-row{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--ink2);margin-bottom:6px}
.cir-conv-row:last-child{margin-bottom:0}
.cir-conv-lbl{font-size:10px;font-weight:700;color:var(--white);background:var(--b);border-radius:5px;padding:2px 6px;flex-shrink:0;letter-spacing:.04em;min-width:36px;text-align:center}
.cc-inp{width:52px;padding:6px 8px;border:1.5px solid var(--bd);border-radius:6px;font-size:13px;font-family:inherit;text-align:center;outline:none}
.cc-inp:focus{border-color:var(--bm)}
.mode-toggles{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.mt-btn{padding:5px 10px;border-radius:8px;border:1.5px solid var(--bd);background:var(--white);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink3)}
.mt-btn.on{background:var(--b);color:#fff;border-color:var(--b)}
.add-inp{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--r2);font-size:14px;font-family:inherit;background:var(--white);color:var(--ink);outline:none;margin-bottom:8px}
.add-inp:focus{border-color:var(--bm)}
.btn{padding:9px 14px;border-radius:var(--r2);border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:var(--b);color:#fff}
.btn-d{background:var(--red);color:#fff}
.btn-o{background:var(--white);color:var(--ink2);border:1.5px solid var(--bd)}
.btn-sm{padding:5px 9px;font-size:11px}
.btn-full{width:100%;justify-content:center;padding:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0F1923;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:600;display:none;pointer-events:none;white-space:nowrap;font-weight:500}
.empty{text-align:center;color:var(--ink3);padding:28px;font-size:14px}

/* 品項排序 */
.cir-row-wrap{display:flex;gap:6px;align-items:flex-start}
.sort-col{display:flex;flex-direction:column;gap:3px;padding-top:2px;flex-shrink:0}
.sort-btn{width:26px;height:26px;border-radius:5px;border:1.5px solid var(--bd);background:var(--white);color:var(--ink2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit}
.sort-btn:disabled{opacity:.22;cursor:default}
.sort-btn:active:not(:disabled){background:var(--bl)}
.cfg-item-row{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:10px 12px;margin-bottom:6px;flex:1;min-width:0}

/* 品項名稱/分類可編輯 */
.cir-name-inp{font-size:14px;font-weight:700;border:none;background:transparent;color:var(--ink);font-family:inherit;width:100%;outline:none;padding:1px 4px;border-radius:4px}
.cir-name-inp:focus{background:var(--white);border:1.5px solid var(--bm)}
.cir-cat-inp{font-size:11px;color:var(--ink3);border:none;background:transparent;font-family:inherit;width:100%;outline:none;padding:1px 4px;border-radius:4px;margin-top:1px}
.cir-cat-inp:focus{background:var(--white);border:1.5px solid var(--bm);color:var(--ink2)}

/* 自訂數字小鍵盤 */
.numpad-wrap{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-radius:20px 20px 0 0;z-index:600;transform:translateY(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);padding:12px 14px 32px;max-width:540px;margin:0 auto;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
.numpad-wrap.show{transform:translateY(0)}
.numpad-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 10px}
.numpad-header{display:flex;align-items:stretch;gap:8px;margin-bottom:8px}
.numpad-info{flex:1;display:flex;flex-direction:column;gap:2px}
.numpad-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}
.numpad-display{font-size:36px;font-weight:900;color:var(--ink);letter-spacing:-.5px;min-height:44px;line-height:1}
.numpad-hint{font-size:11px;color:var(--ink3);margin-bottom:10px;min-height:14px;line-height:1.4}
.numpad-total{background:var(--gl);border-radius:var(--r2);padding:7px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.nt-lbl{font-size:11px;font-weight:700;color:var(--g)}
.nt-val{font-size:18px;font-weight:900;color:var(--g)}
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.nk{padding:15px 6px;border-radius:var(--r2);border:none;font-size:24px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink);background:var(--bg);-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
.nk:active{background:var(--bd);transform:scale(.95)}
.nk-del{background:var(--amberl);color:var(--amber);font-size:20px}
.nk-clear{background:var(--redl);color:var(--red);font-size:13px;font-weight:800}
.nk-dot{font-size:28px}
.numpad-ok{width:100%;padding:15px;background:linear-gradient(135deg,var(--b),var(--bm));color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.numpad-ok:active{opacity:.85}
.numpad-backdrop{display:none;position:fixed;inset:0;z-index:599}
.numpad-backdrop.show{display:block}
/* 單位切換 tabs */
.np-unit-tab{flex:1;padding:8px 4px;border-radius:var(--r2);border:2px solid var(--bd);background:var(--white);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink3);text-align:center;transition:all .1s;line-height:1.3}
.np-unit-tab.active{background:var(--b);color:#fff;border-color:var(--b)}
.np-unit-tab .np-tab-val{font-size:16px;font-weight:900;display:block;color:var(--ink)}
.np-unit-tab.active .np-tab-val{color:#fff}
.np-unit-tab .np-tab-lbl{font-size:10px;color:var(--ink3);display:block;margin-top:1px}
.np-unit-tab.active .np-tab-lbl{color:rgba(255,255,255,.75)}
/* ── 批量編輯 ── */
.bulk-ov{display:none;position:fixed;inset:0;background:var(--bg);z-index:400;flex-direction:column}
.bulk-ov.show{display:flex}
.bulk-topbar{background:linear-gradient(135deg,#1A3A5C,#2A5A8C);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.bulk-title{color:#fff;font-size:15px;font-weight:900;flex:1}
.bulk-tabs{display:flex;gap:4px;background:rgba(0,0,0,.18);border-radius:20px;padding:3px}
.bulk-tab{padding:5px 11px;border-radius:16px;border:none;background:transparent;color:rgba(255,255,255,.65);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.bulk-tab.on{background:#fff;color:var(--b)}
.bulk-bar{background:var(--white);border-bottom:1px solid var(--bd);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.bulk-save-btn{padding:8px 18px;background:var(--g);color:#fff;border:none;border-radius:var(--r2);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.bulk-save-btn:active{opacity:.8}
.bulk-save-btn:disabled{opacity:.4;cursor:default}
.bulk-add-btn{padding:8px 14px;background:var(--bl);color:var(--b);border:1.5px solid var(--bm);border-radius:var(--r2);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.bulk-cancel-btn{padding:8px 14px;background:var(--white);color:var(--ink3);border:1.5px solid var(--bd);border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.bulk-badge{padding:4px 10px;background:var(--amberl);color:var(--amber);border-radius:10px;font-size:11px;font-weight:700}
.bulk-body{flex:1;overflow:auto}
.bt{border-collapse:collapse;width:max-content;min-width:100%}
.bt thead th{position:sticky;top:0;z-index:2;background:#1A3A5C;color:#fff;padding:8px 9px;font-size:11px;font-weight:700;letter-spacing:.05em;text-align:left;white-space:nowrap;border-right:1px solid rgba(255,255,255,.12)}
.bt thead th.th-grp{background:#0F2640;text-align:center}
.bt thead th.th-fix{position:sticky;left:0;z-index:3;background:#0F2640}
.bt tbody tr:nth-child(even) td{background:#f7f9fc}
.bt tbody tr:hover td{background:#eef3fa}
.bt tbody tr.row-changed td{background:#FFFBEA !important}
.bt tbody tr.row-new td{background:#EDF7EE !important}
.bt td{padding:3px 4px;border-bottom:1px solid var(--bd);border-right:1px solid #e4eaf2;vertical-align:middle}
.bt td.td-fix{position:sticky;left:0;z-index:1;background:inherit;padding:3px 6px;min-width:80px}
.bt-inp{width:100%;padding:5px 6px;border:1.5px solid transparent;border-radius:4px;font-size:13px;font-family:inherit;background:transparent;color:var(--ink);outline:none}
.bt-inp:focus{border-color:var(--bm);background:#fff}
.bt-inp.w-name{width:110px}
.bt-inp.w-cat{width:80px}
.bt-inp.w-unit{width:48px}
.bt-inp.w-num{width:58px;text-align:right}
.bt-chk{width:17px;height:17px;cursor:pointer;accent-color:var(--b);display:block;margin:0 auto}
.bt-del{border:none;background:none;color:var(--ink4);font-size:15px;cursor:pointer;padding:3px 6px;border-radius:4px}
.bt-del:hover{color:var(--red);background:var(--redl)}
.bt-sort{border:1px solid var(--bd);background:#fff;color:var(--ink3);font-size:10px;cursor:pointer;border-radius:3px;padding:2px 5px;line-height:1}
.bt-sort:disabled{opacity:.2;cursor:default}
.bt-sort:active:not(:disabled){background:var(--bl)}
</style>
</head>
<body>
<div class="topbar">
  <div>

// ── 通用雲端 cfg helper ──────────────────
// ══════════════════════════════════════════════════════
// 資料層 — 雲端優先，跨設備同步
// 策略：
//   寫入：本機先存（即時），同時推雲端（確認）
//   讀取：以雲端版本號判斷是否需要更新
//   同步：頁面載入 + 每 30 秒輪詢一次
// ══════════════════════════════════════════════════════

var _syncVer = 0;       // 本機目前對應的雲端版本
var _saveTimer = null;  // 防抖計時器，避免每次輸入都打 API
var _syncLocked = false; // 存檔進行中，暫緩同步覆蓋

// ── API 工具 ──────────────────────────────────────────
// GET：小資料（讀取、短參數）
// POST：大資料（cfgSet items 等）
function api(params, cb){
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&');
  // 超過 1500 字元自動改 POST，避免 URL 長度限制
  if(qs.length > 1500){
    apiPost(params, cb);
  } else {
    fetch(API_URL+'?'+qs)
      .then(function(r){ return r.json(); })
      .then(function(d){ if(cb) cb(d, null); })
      .catch(function(e){ if(cb) cb(null, e); });
  }
}
function apiPost(params, cb){
  // 用 form-urlencoded 避免 CORS preflight（不設 Content-Type: application/json）
  var body = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&');
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body
  })
    .then(function(r){ return r.json(); })
    .then(function(d){ if(cb) cb(d, null); })
    .catch(function(e){ if(cb) cb(null, e); });
}

function cfgSet(key, value, cb){
  // cfgSet 固定走 POST（value 可能很大）
  var strVal = (typeof value === 'string') ? value : JSON.stringify(value);
  apiPost({action:'cfgSet', key:key, value:strVal}, cb || null);
}
function cfgGet(key, cb){
  api({action:'cfgGet', key:key}, function(d){
    if(d && d.ok && d.value != null){
      var raw = d.value;
      if(typeof raw === 'string'){
        try{ cb(JSON.parse(raw)); return; }catch(e){}
        cb(raw);
      } else {
        cb(raw);
      }
      return;
    }
    cb(null);
  });
}

function setSyncStatus(state){
  // state: 'ok' | 'saving' | 'error' | 'syncing'
  var el = document.getElementById('sync-status');
  if(!el) return;
  var map = { ok:'☁️', saving:'💾', error:'⚠️', syncing:'🔄' };
  el.textContent = map[state] || '☁️';
}

// ── 初始化 ────────────────────────────────────────────
window.onload = function(){
  loadLocal();
  document.getElementById('setup-date').value = todayStr();
  buildPersonGrid();
  pullFromCloud(true); // 首次強制拉
  // 每 30 秒輪詢一次（讓其他設備的修改能同步過來）
  setInterval(function(){ if(!_syncLocked) pullFromCloud(false); }, 30000);
};

// 從 localStorage 快速載入（開畫面用，不會白屏）
function loadLocal(){
  try{
    var r = localStorage.getItem('inv3_items');
    var p = r ? JSON.parse(r) : null;
    items = (p && Array.isArray(p) && p.length > 0) ? p : JSON.parse(JSON.stringify(DEFAULT_ITEMS));
  } catch(e){ items = JSON.parse(JSON.stringify(DEFAULT_ITEMS)); }
  try{
    var r2 = localStorage.getItem('inv3_records');
    records = r2 ? JSON.parse(r2) : [];
  } catch(e){ records = []; }
  try{ _syncVer = parseInt(localStorage.getItem('inv3_ver') || '0'); } catch(e){ _syncVer = 0; }
}

// 從雲端拉最新資料
// force=true：不管版本號都覆蓋；force=false：只有雲端版本較新才覆蓋
function pullFromCloud(force){
  setSyncStatus('syncing');
  cfgGet('inv:items', function(v){
    if(_syncLocked) return; // 存檔中，丟棄此次結果
    if(v && Array.isArray(v) && v.length > 0){
      var cloudVer = 0;
      // 嘗試取版本號（附加在 items 陣列後面的隱藏欄位）
      if(v._ver) cloudVer = v._ver;
      if(force || cloudVer > _syncVer || items.length === 0){
        items = v;
        _syncVer = cloudVer || _syncVer;
        localStorage.setItem('inv3_items', JSON.stringify(items));
        localStorage.setItem('inv3_ver', String(_syncVer));
      }
    }
    setSyncStatus('ok');
    buildPersonGrid();
  });
  cfgGet('inv:records', function(v){
    if(v && Array.isArray(v)){
      records = v;
      try{ localStorage.setItem('inv3_records', JSON.stringify(v)); } catch(e){}
    }
  });
}

// 存品項到本機 + 雲端（防抖：最後一次操作 800ms 後才打 API）
function saveItems(){
  // 1. 立即存本機（不等 API）
  localStorage.setItem('inv3_items', JSON.stringify(items));
  setSyncStatus('saving');
  // 2. 防抖：連續修改只發一次 API
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function(){
    _syncLocked = true;
    var snapshot = JSON.parse(JSON.stringify(items)); // 存快照防競態
    cfgSet('inv:items', snapshot, function(d){
      _syncLocked = false;
      if(d && d.ok){
        setSyncStatus('ok');
      } else {
        setSyncStatus('error');
        showToast('⚠️ 雲端同步失敗，設定已存在本機');
      }
    });
  }, 800);
}

function saveRecords(){
  var trimmed = records.slice(0, 50);
  localStorage.setItem('inv3_records', JSON.stringify(trimmed));
  cfgSet('inv:records', trimmed);
}
function getItemsForMode(mode){
  if(mode==='monthly') return items;
  return items.filter(function(i){ return i.modes&&i.modes.indexOf(mode==='daily'?'D':'W')>-1; });

// ── 盤點頁 ─────────────────────────────────────────────────────
function renderCountPage(){
  var modeItems=getItemsForMode(curMode);
  var done=Object.keys(counts).length;
  var pct=modeItems.length?Math.round(done/modeItems.length*100):0;
  var modeLabels={daily:'每日盤補貨',weekly:'每週盤叫貨',monthly:'月盤點'};
  document.getElementById('prog-info').textContent=modeLabels[curMode]+' · '+selPerson;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  var fb=document.getElementById('finish-btn');
  fb.disabled=done<modeItems.length;
  fb.style.opacity=done>=modeItems.length?1:0.4;
  fb.textContent=curMode==='daily'?'✓ 完成，查看需補貨':curMode==='weekly'?'✓ 完成，查看需叫貨':'✓ 完成月盤點';
  fb.className='finish-btn fb-'+(curMode==='daily'?'daily':curMode==='weekly'?'weekly':'monthly');

  var cats=[...new Set(modeItems.map(function(i){return i.cat;}))];
  var html='';
  cats.forEach(function(cat){
    var ci=modeItems.filter(function(i){return i.cat===cat;});
    html+='<div class="cat-lbl">'+cat+' <span class="cat-cnt">'+ci.length+'</span></div>';
    ci.forEach(function(item){
      var c=counts[item.id];
      var filled=c!==undefined;
      var total=filled?calcTotal(item,c):null;
      var status='';
      var cls='';
      if(filled&&curMode!=='monthly'){
        var cfg=item[curMode];
        if(cfg){
          if(total<cfg.min){cls='filled-low';status='⚠ 不足 低標:'+cfg.min+item.sn+' 不足';}
          else if(total===0){cls='filled-zero';}
          else{cls='filled-ok';}
        }
      } else if(filled){cls='filled-ok';}
      var totalCls=!filled?'':cls==='filled-low'?'low':cls==='filled-zero'?'zero':'ok';
      html+='<div class="item-card '+cls+'" onclick="openNumOv(\''+item.id+'\')">'
        +'<div class="ic-top">'
          +'<span class="ic-name">'+item.name+'</span>'
          +'<span class="ic-total '+totalCls+'">'+(filled?(total+' '+item.sn):'—')+'</span>'
        +'</div>';
      if(filled&&c){
        var parts=[];
        if(item.ln&&c.l) parts.push(c.l+item.ln);
        if(item.mn&&c.m) parts.push(c.m+item.mn);
        if(c.s!==undefined) parts.push(c.s+item.sn);
        if(item.wu&&c.w) parts.push(c.w+item.wu);
        if(parts.length>1) html+='<div class="ic-units-row">'+parts.join(' + ')+'</div>';
      }
      if(curMode!=='monthly'&&item[curMode]){
        var t=item[curMode];
        html+='<div class="ic-sub"><span class="ic-threshold">低標:'+t.min+item.sn+'</span><span>補至:'+t.target+item.sn+'</span>';
        if(status) html+='<span style="color:var(--red);font-weight:700">'+status+'</span>';
        html+='</div>';
      }
      html+='</div>';
    });
  });
  document.getElementById('count-body').innerHTML=html;
}

function calcTotal(item,c){
  var total=(parseFloat(c.s)||0);
  if(item.mn&&item.ms>0) total+=(parseFloat(c.m)||0)*item.ms;
  if(item.ln&&item.lm>0&&item.ms>0) total+=(parseFloat(c.l)||0)*item.lm*item.ms;
  else if(item.ln&&item.lm>0) total+=(parseFloat(c.l)||0)*item.lm;
  return Math.round(total*100)/100;
}

        if(item.ln&&c.l) parts.push(c.l+item.ln);

    html+='<div class="unit-row" style="opacity:.7">'
      +'<span class="ur-lbl">'+item.wu+'(重)</span>'
      +'<input class="ur-inp" id="inp-w" type="number" min="0" step="0.1" value="'+(c.w||0)+'" oninput="recalcW()" inputmode="decimal" style="font-size:16px;color:var(--purple)">'
      +'<span class="ur-unit">'+item.wu+'</span></div>';
    html+='<div style="font-size:11px;color:var(--purple);text-align:center;margin-bottom:8px">重量會換算加入總量（'+item.sw+' '+item.wu+'/'+item.sn+'）</div>';
  }
  document.getElementById('num-unit-rows').innerHTML=html;
  recalc();
  openOv('num');
  setTimeout(function(){
    var first=document.querySelector('#num-unit-rows .ur-inp');
    if(first){first.focus();first.select();}
  },100);
}

function recalc(){
  var item=items.find(function(i){return i.id===curItemId;});
  if(!item) return;
  var s=parseFloat(document.getElementById('inp-s')&&document.getElementById('inp-s').value)||0;
  var m=document.getElementById('inp-m')?(parseFloat(document.getElementById('inp-m').value)||0):0;
  var l=document.getElementById('inp-l')?(parseFloat(document.getElementById('inp-l').value)||0):0;
  var w=document.getElementById('inp-w')?(parseFloat(document.getElementById('inp-w').value)||0):0;
  var wConverted=item.sw>0?(w/item.sw):0;
  var total=calcTotal(item,{s:s,m:m,l:l})+wConverted;
  document.getElementById('num-total').textContent=Math.round(total*100)/100;
}
function recalcW(){
  // 重量輸入時也重新計算
  recalc();
}

function confirmNum(){
  var isMonthly=curItemId.startsWith('monthly_');
  var realId=isMonthly?curItemId.replace('monthly_',''):curItemId;
  var item=items.find(function(i){return i.id===realId;});
  if(!item) return;
  var s=parseFloat(document.getElementById('inp-s')&&document.getElementById('inp-s').value)||0;
  var m=document.getElementById('inp-m')?(parseFloat(document.getElementById('inp-m').value)||0):0;
  var l=document.getElementById('inp-l')?(parseFloat(document.getElementById('inp-l').value)||0):0;
  var w=document.getElementById('inp-w')?(parseFloat(document.getElementById('inp-w').value)||0):0;
  if(isMonthly){
    var key=curMonthlyLoc==='現場'?'S':'W';
    counts[key+'_'+realId]={s:s,m:m,l:l,w:w};
    closeOv('num');
    renderMonthlyLocPage();
  } else {
    counts[curItemId]={s:s,m:m,l:l,w:w};
    closeOv('num');
    renderCountPage();
  }
  showToast('✓ '+item.name+'：'+calcTotal(item,{s:s,m:m,l:l})+item.sn);
}

// ── 完成盤點 ──────────────────────────────────────────────────
function finishCount(){
  var date=document.getElementById('setup-date').value;
  var modeItems=getItemsForMode(curMode);
  var modeLabels={daily:'今日補貨清單',weekly:'本週叫貨清單',monthly:'月盤點結果'};
  var modeIcons={daily:'📋',weekly:'📦',monthly:'📊'};
  document.getElementById('rb-icon').textContent=modeIcons[curMode];
  document.getElementById('rb-title').textContent=modeLabels[curMode];
  document.getElementById('rb-sub').textContent=date+' · '+selPerson;
  document.getElementById('result-banner').className='result-banner rb-'+curMode;

  var actionItems=[],okItems=[];
  modeItems.forEach(function(item){
    var c=counts[item.id]||{s:0,m:0,l:0,w:0};
    var total=calcTotal(item,c);
    var wConverted=item.sw>0?((c.w||0)/item.sw):0;
    var realTotal=total+wConverted;
    if(curMode==='monthly'){
      okItems.push({item:item,c:c,total:realTotal});
    } else {
      var cfg=item[curMode];
      var needAmt=cfg?(cfg.target-realTotal):0;
      if(needAmt>0){
        actionItems.push({item:item,c:c,total:realTotal,need:Math.ceil(needAmt)});
      } else {
        okItems.push({item:item,c:c,total:realTotal});
      }
    }
  });

  var html='';
  if(curMode==='monthly'){
    // 月盤：合計現場+倉庫，按分類顯示
    var cats=[...new Set(items.map(function(i){return i.cat;}))];
    cats.forEach(function(cat){
      var ci=items.filter(function(i){return i.cat===cat;});
      html+='<div class="result-section"><div class="rs-head info">'+cat+'</div>';
      ci.forEach(function(item){
        var cS=counts['S_'+item.id]||{s:0,m:0,l:0,w:0};
        var cW=counts['W_'+item.id]||{s:0,m:0,l:0,w:0};
        var totalS=calcTotal(item,cS)+(item.sw>0?(cS.w||0)/item.sw:0);
        var totalW=calcTotal(item,cW)+(item.sw>0?(cW.w||0)/item.sw:0);
        var totalAll=Math.round((totalS+totalW)*100)/100;
        var hasS=getItemLocsForMonthly(item).indexOf('S')>-1;
        var hasW=getItemLocsForMonthly(item).indexOf('W')>-1;
        var detail='';
        if(hasS) detail+='現場:'+Math.round(totalS*100)/100+item.sn;
        if(hasS&&hasW) detail+=' + ';
        if(hasW) detail+='倉庫:'+Math.round(totalW*100)/100+item.sn;
        html+='<div class="rs-row">'
          +'<div><div class="rs-name">'+item.name+'</div>'
            +(detail?'<div class="rs-detail">'+detail+'</div>':'')
          +'</div>'
          +'<div class="rs-qty info">'+totalAll+' '+item.sn+'</div>'
        +'</div>';
      });
      html+='</div>';
    });
  } else {
    // 日盤/週盤：顯示需補/叫清單
    var actionWord=curMode==='daily'?'需補貨':'需叫貨';
    if(actionItems.length){
      html+='<div class="result-section"><div class="rs-head red">⚠ '+actionWord+' — '+actionItems.length+' 項</div>';
      actionItems.forEach(function(x){
        html+='<div class="rs-row">'
          +'<div><div class="rs-name">'+x.item.name+'</div>'
            +'<div class="rs-detail">現有 '+Math.round(x.total*100)/100+x.item.sn+' · 需達 '+x.item[curMode].target+x.item.sn+'</div></div>'
          +'<div class="rs-qty red">+'+x.need+' '+x.item.sn+'</div>'
        +'</div>';
      });
      html+='</div>';
    } else {
      html+='<div class="result-section"><div class="rs-head ok">✅ 所有品項庫存充足，無需'+actionWord+'</div></div>';
    }
    if(okItems.length){
      html+='<div class="result-section"><div class="rs-head ok">✓ 庫存足夠 — '+okItems.length+' 項</div>';
      okItems.forEach(function(x){
        html+='<div class="rs-row"><div class="rs-name">'+x.item.name+'</div>'
          +'<div class="rs-qty ok">'+Math.round(x.total*100)/100+' '+x.item.sn+'</div></div>';
      });
      html+='</div>';
    }
  }
  document.getElementById('result-body').innerHTML=html;

  // 儲存記錄
  var rec={id:Date.now(),mode:curMode,date:date,person:selPerson,counts:JSON.parse(JSON.stringify(counts))};
  records.unshift(rec);
  saveRecords();
  pushToSheets(rec,modeItems,actionItems);
  showPage('result');
}

function pushToSheets(rec, modeItems, actionItems){
  var data;
  if(rec.mode === 'monthly'){
    // 月盤：分現場、倉庫、合計三欄
    data = modeItems.map(function(item){
      var cS = rec.counts['S_'+item.id] || {s:0,m:0,l:0,w:0};
      var cW = rec.counts['W_'+item.id] || {s:0,m:0,l:0,w:0};
      var totalS = calcTotal(item,cS) + (item.sw>0?(cS.w||0)/item.sw:0);
      var totalW = calcTotal(item,cW) + (item.sw>0?(cW.w||0)/item.sw:0);
      var totalAll = Math.round((totalS+totalW)*100)/100;
      return {
        cat: item.cat, item: item.name, unit: item.sn,
        qty_scene: Math.round(totalS*100)/100,
        qty_store: Math.round(totalW*100)/100,
        total: totalAll, need: 0
      };
    });
  } else {
    // 日盤/週盤
    data = modeItems.map(function(item){
      var c = rec.counts[item.id] || {s:0,m:0,l:0,w:0};
      var total = calcTotal(item,c);
      var wConverted = item.sw>0?((c.w||0)/item.sw):0;
      var realTotal = total + wConverted;
      var cfg = item[rec.mode];
      var need = cfg ? Math.max(0, cfg.target - realTotal) : 0;
      return {
        cat: item.cat, item: item.name, unit: item.sn,
        qty_l: c.l||0, qty_m: c.m||0, qty_s: c.s||0, qty_w: c.w||0,
        total: Math.round(realTotal*100)/100, need: Math.ceil(need)
      };
    });
  }
  api({action:'invSave', mode:rec.mode, date:rec.date, person:rec.person, data:JSON.stringify(data)},
    function(d){ if(d&&d.ok) showToast('✓ 已同步 Google Sheets'); });
}

var bulkMode = 'all';   // 'all' | 'daily' | 'weekly'
var bulkDraft = [];     // 目前編輯中的草稿（items 的深拷貝）
var bulkChanged = {};   // {id: true} 有修改的列

function openBulk(){
  bulkDraft = JSON.parse(JSON.stringify(items)); // 深拷貝
  bulkChanged = {};
  bulkMode = 'all';
  renderBulkTabs();
  renderBulkTable();
  document.getElementById('bulk-ov').classList.add('show');
}
function closeBulk(){
  var hasChanges = Object.keys(bulkChanged).length > 0;
  if(hasChanges && !confirm('有未儲存的修改，確定關閉？')) return;
  document.getElementById('bulk-ov').classList.remove('show');
}

function renderBulkTabs(){
  var tabs = [
    {id:'all',    lbl:'全部'},
    {id:'daily',  lbl:'📅 日盤'},
    {id:'weekly', lbl:'📆 週盤'},
  ];
  document.getElementById('bulk-tabs').innerHTML = tabs.map(function(t){
    return '<button class="bulk-tab'+(t.id===bulkMode?' on':'')+'" onclick="switchBulkTab(\''+t.id+'\')">'+t.lbl+'</button>';
  }).join('');
}
function switchBulkTab(m){ bulkMode=m; renderBulkTabs(); renderBulkTable(); }

function bulkList(){
  if(bulkMode==='all') return bulkDraft;
  var key = bulkMode==='daily'?'D':'W';
  return bulkDraft.filter(function(i){ return i.modes&&i.modes.indexOf(key)>-1; });
}

    '</tr>'+
    '<tr>'+
    '<th class="th-fix"></th>'+
    '<th class="th-fix"></th>'+
    '<th></th>'+
    '<th>小</th><th>中</th><th>大</th>'+
    '<th style="min-width:70px">中→小</th>'+

          '<button class="bt-sort" '+(isLast?'disabled':'')+' onclick="bulkMove(\''+item.id+'\',1)">▼</button>'+
        '</div>'+
      '</td>'+
      // 名稱
      '<td class="td-fix"><input class="bt-inp w-name" value="'+esc(item.name)+'" onchange="bulkEdit(\''+item.id+'\',\'name\',this.value)"></td>'+
      // 分類
      '<td><input class="bt-inp w-cat" value="'+esc(item.cat)+'" onchange="bulkEdit(\''+item.id+'\',\'cat\',this.value)"></td>'+

      '<td><input class="bt-inp w-unit" value="'+esc(item.mn||'')+'" placeholder="中" onchange="bulkEdit(\''+item.id+'\',\'mn\',this.value)"></td>'+
      '<td><input class="bt-inp w-unit" value="'+esc(item.ln||'')+'" placeholder="大" onchange="bulkEdit(\''+item.id+'\',\'ln\',this.value)"></td>'+

      '<td><input class="bt-inp w-num" type="number" min="0" value="'+(item.ms||'')+'" placeholder="—" onchange="bulkEdit(\''+item.id+'\',\'ms\',this.value)"></td>'+
      '<td><input class="bt-inp w-num" type="number" min="0" value="'+(item.lm||'')+'" placeholder="—" onchange="bulkEdit(\''+item.id+'\',\'lm\',this.value)"></td>'+

function bulkEdit(id, field, value){
  var item = bulkDraft.find(function(i){ return i.id===id; });
  if(!item) return;
  if(['ms','lm','sw'].indexOf(field)>-1) item[field] = parseFloat(value)||0;
  else item[field] = value;
  bulkChanged[id] = true;
  markRowChanged(id);
  updateBulkBadge();
}
function bulkEditMode(id, key, checked){
  var item = bulkDraft.find(function(i){ return i.id===id; });
  if(!item) return;
  item.modes = item.modes||'';
  if(checked){ if(item.modes.indexOf(key)===-1) item.modes+=key; }
  else { item.modes = item.modes.replace(key,''); }
  bulkChanged[id] = true;
  markRowChanged(id);
  updateBulkBadge();
}
function bulkEditTarget(id, mode, field, value){
  var item = bulkDraft.find(function(i){ return i.id===id; });
  if(!item) return;
  if(!item[mode]) item[mode]={min:0,target:0};
  item[mode][field] = parseFloat(value)||0;
  bulkChanged[id] = true;
  markRowChanged(id);
  updateBulkBadge();
}
function bulkMove(id, dir){
  var idx = bulkDraft.findIndex(function(i){ return i.id===id; });
  if(idx<0) return;
  var ni = idx+dir;
  if(ni<0||ni>=bulkDraft.length) return;
  var tmp=bulkDraft[idx]; bulkDraft[idx]=bulkDraft[ni]; bulkDraft[ni]=tmp;
  // 標記兩者都 changed
  bulkChanged[id]=true;
  bulkChanged[bulkDraft[idx].id]=true;
  renderBulkTable();
}
function bulkDel(id){
  if(!confirm('確定刪除？')) return;
  bulkDraft = bulkDraft.filter(function(i){ return i.id!==id; });
  delete bulkChanged[id];
  // 標記整體有改動（用特殊 key）
  bulkChanged['__deleted__'] = true;
  renderBulkTable();
}
function bulkAddRow(){
  var newItem = {
    id: 'c_'+Date.now(),
    name:'新品項', cat:'其他',
    modes:'DW', sn:'個', mn:'', ln:'',
    ms:0, lm:0, wu:'', sw:0,
    daily:{min:0,target:0}, weekly:{min:0,target:0},
    _new: true
  };
  bulkDraft.push(newItem);
  bulkChanged[newItem.id]=true;
  renderBulkTable();
  // 滾到底部
  setTimeout(function(){
    var body = document.getElementById('bulk-body');
    body.scrollTop = body.scrollHeight;
  }, 60);
}

function markRowChanged(id){
  var row = document.getElementById('brow-'+id);
  if(row){ row.className = row.className.replace(/row-changed|row-new/g,'').trim()+' row-changed'; }
}
function updateBulkBadge(){
  var n = Object.keys(bulkChanged).filter(function(k){ return k!=='__deleted__'; }).length;
  var badge = document.getElementById('bulk-badge');
  if(n>0||bulkChanged['__deleted__']){
    badge.style.display='inline-block';
    badge.textContent = '⚠ '+(n>0?n+'項有修改':'已有刪除');
  } else {
    badge.style.display='none';
  }
}

function bulkSave(){
  var hasChanges = Object.keys(bulkChanged).length > 0;
  if(!hasChanges){ showToast('沒有修改'); return; }
  var btn = document.getElementById('bulk-save-btn');
  btn.disabled = true; btn.textContent = '⏳ 儲存中...';
  // 把草稿寫回 items
  items = JSON.parse(JSON.stringify(bulkDraft));
  // 清除暫時的 _new flag
  items.forEach(function(i){ delete i._new; });
  saveItems(); // 儲存到本機 + 雲端
  bulkChanged = {};
  updateBulkBadge();
  btn.disabled = false; btn.textContent = '💾 儲存全部';
  renderBulkTable(); // 重繪（清除高亮）
  showToast('✓ 已儲存全部設定');
}

      '<div class="cfg-item-row" style="flex:1;min-width:0">'+
        // 頭：名稱+分類可編輯，刪除
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px">'+
          '<div style="flex:1;min-width:0;margin-right:8px">'+
            '<input class="cir-name-inp" value="'+esc(item.name)+'" placeholder="品項名稱"'+
              ' onblur="updItemSave(\''+item.id+'\',\'name\',this.value)">'+
            '<input class="cir-cat-inp" value="'+esc(item.cat)+'" placeholder="分類"'+
              ' onblur="updItemSave(\''+item.id+'\',\'cat\',this.value)">'+

        '</div>'+
        // 單位
        '<div class="cir-fields">'+
          '<div class="cir-field"><div class="cfl">小單位</div><input class="cf-inp" value="'+esc(item.sn)+'" placeholder="如包" onblur="updItemSave(\''+item.id+'\',\'sn\',this.value)"></div>'+
          '<div class="cir-field"><div class="cfl">中單位</div><input class="cf-inp" value="'+esc(item.mn||'')+'" placeholder="（無）" onblur="updItemSave(\''+item.id+'\',\'mn\',this.value)"></div>'+
          '<div class="cir-field"><div class="cfl">大單位</div><input class="cf-inp" value="'+esc(item.ln||'')+'" placeholder="（無）" onblur="updItemSave(\''+item.id+'\',\'ln\',this.value)"></div>'+
        '</div>'+
        // 換算（永遠顯示，永遠可改）
        '<div class="cir-conv-block">'+
          '<div class="cir-conv-row">'+
            '<span class="cir-conv-lbl">中→小</span>'+
            '1 <b>'+(item.mn||'中')+'</b> =&nbsp;'+
            '<input class="cc-inp" type="number" min="0" value="'+(item.ms||'')+'" placeholder="?" onchange="updItemSave(\''+item.id+'\',\'ms\',this.value)">'+
            '&nbsp;<b>'+(item.sn||'小')+'</b>'+
          '</div>'+
          '<div class="cir-conv-row">'+
            '<span class="cir-conv-lbl">大→中</span>'+
            '1 <b>'+(item.ln||'大')+'</b> =&nbsp;'+
            '<input class="cc-inp" type="number" min="0" value="'+(item.lm||'')+'" placeholder="?" onchange="updItemSave(\''+item.id+'\',\'lm\',this.value)">'+
            '&nbsp;<b>'+(item.mn||'中')+'</b>'+
          '</div>'+
          '<div class="cir-conv-row">'+
            '<span class="cir-conv-lbl">特殊</span>'+
            '<input class="cc-inp" style="width:42px" value="'+esc(item.wu||'')+'" placeholder="單位" onblur="updItemSave(\''+item.id+'\',\'wu\',this.value)">'+
            '&nbsp;1 <b>'+(item.sn||'小')+'</b> =&nbsp;'+
            '<input class="cc-inp" type="number" min="0" value="'+(item.sw||'')+'" placeholder="?" onchange="updItemSave(\''+item.id+'\',\'sw\',this.value)">'+
            '&nbsp;<b>'+(item.wu||'—')+'</b>'+
          '</div>'+
        '</div>'+
        // 低標/補至（非月盤）
        (cfgMode!=='monthly'?
          '<div class="cir-conv" style="margin-top:6px">'+

            '　補至: <input class="cc-inp" type="number" min="0" value="'+(t.target||0)+'" onchange="updItemMode(\''+item.id+'\',\''+cfgMode+'\',\'target\',this.value)"> '+item.sn+
          '</div>'
        :'')+

        '<div class="mode-toggles">'+
          '<span style="font-size:11px;color:var(--ink3)">出現在：</span>'+
          ['daily','weekly'].map(function(m){
            var has=item.modes&&item.modes.indexOf(m==='daily'?'D':'W')>-1;
            return '<button class="mt-btn'+(has?' on':'')+'" onclick="toggleMode(\''+item.id+'\',\''+m+'\')">'+(m==='daily'?'日盤':'週盤')+'</button>';
          }).join('')+

        '<div class="mode-toggles" style="margin-top:4px">'+
          '<span style="font-size:11px;color:var(--ink3)">月盤地點：</span>'+
          [{k:'S',l:'🏪 現場'},{k:'W',l:'📦 倉庫'}].map(function(x){
            var has=(item.locs||'SW').indexOf(x.k)>-1;
            return '<button class="mt-btn'+(has?' on':'')+'" style="'+(has?'background:var(--g);color:#fff;border-color:var(--g)':'')+'" onclick="toggleLoc(\''+item.id+'\',\''+x.k+'\')">'+x.l+'</button>';
          }).join('')+

  });
  document.getElementById('cfg-body').innerHTML=html;
}
function esc(s){ return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function moveItem(id,dir){
  var idx=items.findIndex(function(i){return i.id===id;});
  if(idx<0) return;
  var ni=idx+dir;
  if(ni<0||ni>=items.length) return;
  var tmp=items[idx]; items[idx]=items[ni]; items[ni]=tmp;
  saveItems(); renderCfgBody();
  setTimeout(function(){var el=document.getElementById('cfgrow-'+id);if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});},60);
}
// updItemSave：修改後立即儲存到雲端
function updItemSave(id,field,value){
  var item=items.find(function(i){return i.id===id;});
  if(!item) return;
  if(['ms','lm','sw'].indexOf(field)>-1) item[field]=parseFloat(value)||0;
  else item[field]=String(value);
  saveItems();
}
function updItem(id,field,value){ updItemSave(id,field,value); }
function updItemMode(id,mode,field,value){
  var item=items.find(function(i){return i.id===id;});
  if(!item) return;
  if(!item[mode]) item[mode]={min:0,target:0};
  item[mode][field]=parseFloat(value)||0;
  saveItems();
}
function toggleMode(id,mode){
  var item=items.find(function(i){return i.id===id;});
  if(!item) return;
  var key=mode==='daily'?'D':'W';
  if(item.modes&&item.modes.indexOf(key)>-1) item.modes=item.modes.replace(key,'');
  else item.modes=(item.modes||'')+key;
  saveItems(); renderCfgBody();
}
function toggleLoc(id,loc){
  var item=items.find(function(i){return i.id===id;});
  if(!item) return;
  if(!item.locs) item.locs='SW';
  if(item.locs.indexOf(loc)>-1){
    if(item.locs.length>1) item.locs=item.locs.replace(loc,'');
    else{showToast('至少需要一個地點');return;}
  } else {
    item.locs+=loc;
  }
  saveItems(); renderCfgBody();
}
function delItem(id){
  if(!confirm('確定刪除？')) return;
  items=items.filter(function(i){return i.id!==id;});
  saveItems(); renderCfgBody(); showToast('已刪除');
}
function addNewItem(){
  var name=document.getElementById('ni-name').value.trim();
  if(!name){showToast('請輸入品項名稱');return;}
  var cat=document.getElementById('ni-cat').value.trim()||'其他';
  var sn=document.getElementById('ni-sn').value.trim()||'個';
  var mn=document.getElementById('ni-mn').value.trim();
  var ln=document.getElementById('ni-ln').value.trim();
  var ms=parseFloat(document.getElementById('ni-ms').value)||0;
  var lm=parseFloat(document.getElementById('ni-lm').value)||0;
  var wu=document.getElementById('ni-wu').value.trim();
  var sw=parseFloat(document.getElementById('ni-sw').value)||0;
  var modes='';
  if(document.getElementById('ni-daily').checked) modes+='D';
  if(document.getElementById('ni-weekly').checked) modes+='W';
  items.push({id:'c_'+Date.now(),name:name,cat:cat,modes:modes,
    sn:sn,mn:mn,ln:ln,ms:ms,lm:lm,wu:wu,sw:sw,
    daily:{min:0,target:0},weekly:{min:0,target:0}});
  saveItems();
  ['ni-name','ni-cat','ni-sn','ni-mn','ni-ln','ni-ms','ni-lm','ni-wu','ni-sw'].forEach(function(id){
    document.getElementById(id).value='';
  });
  renderCfgBody(); showToast('✓ 已新增：'+name);
}

// ── 歷史記錄 ──────────────────────────────────────────────────
function showHist(){
  var modeLabels={daily:'日盤',weekly:'週盤',monthly:'月盤'};
  var modeColors={daily:'var(--b)',weekly:'var(--purple)',monthly:'var(--g)'};
  var el=document.getElementById('hist-body');
  if(!records.length){el.innerHTML='<div class="empty">尚無記錄</div>';openOv('hist');return;}
  el.innerHTML=records.slice(0,30).map(function(r,ri){
    var mc=modeColors[r.mode]||'var(--b)';
    var ml=modeLabels[r.mode]||r.mode;
    return '<div style="border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:8px;overflow:hidden">'+
      '<div style="padding:11px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--white)" onclick="toggleHistRow('+ri+')">'+
        '<div>'+
          '<div style="font-size:14px;font-weight:700">'+r.date+'</div>'+
          '<div style="font-size:12px;color:var(--ink3);margin-top:2px">'+r.person+'</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<span style="padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;background:'+mc+'22;color:'+mc+'">'+ml+'</span>'+
          '<span id="hist-arrow-'+ri+'" style="color:var(--ink3);font-size:13px">▼</span>'+
        '</div>'+
      '</div>'+
      '<div id="hist-detail-'+ri+'" style="display:none;border-top:1px solid var(--bd);background:var(--bg)">'+
        histDetailHtml(r)+
      '</div>'+
    '</div>';
  }).join('');
  openOv('hist');
}

function toggleHistRow(ri){
  var detail=document.getElementById('hist-detail-'+ri);
  var arrow=document.getElementById('hist-arrow-'+ri);
  var open=detail.style.display==='none';
  detail.style.display=open?'block':'none';
  arrow.textContent=open?'▲':'▼';
}

function histDetailHtml(r){
  var modeItems=r.mode==='monthly'?items:items.filter(function(i){
    return i.modes&&i.modes.indexOf(r.mode==='daily'?'D':'W')>-1;
  });
  var html='';
  if(r.mode==='monthly'){
    html+='<div style="display:grid;grid-template-columns:1fr 80px 80px 80px;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.06em;padding:7px 13px;border-bottom:1px solid var(--bd)">'+
      '<div>品項</div><div style="text-align:right">🏪現場</div><div style="text-align:right">📦倉庫</div><div style="text-align:right;color:var(--g)">合計</div>'+
    '</div>';
    var lastCat='';
    modeItems.forEach(function(item){
      var cS=r.counts['S_'+item.id]||{s:0,m:0,l:0,w:0};
      var cW=r.counts['W_'+item.id]||{s:0,m:0,l:0,w:0};
      var tS=Math.round((calcTotal(item,cS)+(item.sw>0?(cS.w||0)/item.sw:0))*100)/100;
      var tW=Math.round((calcTotal(item,cW)+(item.sw>0?(cW.w||0)/item.sw:0))*100)/100;
      var tAll=Math.round((tS+tW)*100)/100;
      if(item.cat!==lastCat){
        lastCat=item.cat;
        html+='<div style="padding:5px 13px;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;background:#eaeff7;border-top:1px solid var(--bd)">'+item.cat+'</div>';
      }
      html+='<div style="display:grid;grid-template-columns:1fr 80px 80px 80px;padding:7px 13px;border-top:1px solid var(--bd);font-size:13px;align-items:center">'+
        '<div style="font-weight:500">'+item.name+'</div>'+
        '<div style="text-align:right;color:var(--ink2)">'+tS+' '+item.sn+'</div>'+
        '<div style="text-align:right;color:var(--ink2)">'+tW+' '+item.sn+'</div>'+
        '<div style="text-align:right;font-weight:700;color:var(--g)">'+tAll+' '+item.sn+'</div>'+
      '</div>';
    });
  } else {
    var actionWord=r.mode==='daily'?'需補':'需叫';
    html+='<div style="display:grid;grid-template-columns:1fr 80px 70px;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.06em;padding:7px 13px;border-bottom:1px solid var(--bd)">'+
      '<div>品項</div><div style="text-align:right">現有</div><div style="text-align:right;color:var(--red)">'+actionWord+'</div>'+
    '</div>';
    var lastCat2='';
    modeItems.forEach(function(item){
      var c=r.counts[item.id]||{s:0,m:0,l:0,w:0};
      var total=Math.round((calcTotal(item,c)+(item.sw>0?(c.w||0)/item.sw:0))*100)/100;
      var cfg=item[r.mode]||{min:0,target:0};
      var need=Math.max(0,Math.ceil(cfg.target-total));
      if(item.cat!==lastCat2){
        lastCat2=item.cat;
        html+='<div style="padding:5px 13px;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;background:#eaeff7;border-top:1px solid var(--bd)">'+item.cat+'</div>';
      }
      var needColor=need>0?'color:var(--red);font-weight:700':'color:var(--g)';
      html+='<div style="display:grid;grid-template-columns:1fr 80px 70px;padding:7px 13px;border-top:1px solid var(--bd);font-size:13px;align-items:center">'+
        '<div style="font-weight:500">'+item.name+'</div>'+
        '<div style="text-align:right;color:var(--ink2)">'+total+' '+item.sn+'</div>'+
        '<div style="text-align:right;'+needColor+'">'+(need>0?'+'+need:'✓')+'</div>'+
      '</div>';
    });
  }
  return html;
}

// 自訂數字小鍵盤系統
// ══════════════════════════════════════════════════════════════
var _np = { val:'0', mode:'', itemId:'', field:'', isMonthly:false, vals:{}, cb:null };

function npOpen(opts){
  _np = Object.assign({ val:'0', vals:{}, cb:null }, opts);
  document.getElementById('np-display').textContent = _np.val;
  document.getElementById('np-label').textContent = _np.label||'數量';
  document.getElementById('np-hint').textContent = _np.hint||'';
  var showTotal = _np.mode==='count';
  document.getElementById('np-total-row').style.display = showTotal?'flex':'none';
  if(showTotal){
    document.getElementById('np-total-unit').textContent = _np.unit||'';
    npUpdateTotal();
  }
  // 渲染單位 tab 列
  var tabEl = document.getElementById('np-unit-tabs');
  if(_np.mode==='count' && _np.fields && _np.fields.length > 1){
    tabEl.style.display = 'flex';
    npRenderUnitTabs();
  } else {
    tabEl.style.display = 'none';
  }
  document.getElementById('np-ok-btn').textContent = '✓ 確認';
  document.getElementById('np-backdrop').classList.add('show');
  document.getElementById('numpad-wrap').classList.add('show');
}
function npRenderUnitTabs(){
  var item = items.find(function(i){return i.id===_np.itemId;});
  if(!item) return;
  var unitNames = {
    l: item.ln+'（大）',
    m: item.mn+'（中）',
    s: item.sn+'（小）',
    w: (item.wu||'重')+'（重量）'
  };
  var html = _np.fields.map(function(f){
    var isActive = f === _np.field;
    var val = _np.vals[f] || 0;
    return '<button class="np-unit-tab'+(isActive?' active':'')+'" onclick="npSwitchField(\''+f+'\')">'+
      '<span class="np-tab-val">'+(val||0)+'</span>'+
      '<span class="np-tab-lbl">'+(unitNames[f]||f)+'</span>'+
    '</button>';
  }).join('');
  document.getElementById('np-unit-tabs').innerHTML = html;
}
function npSwitchField(f){
  _np.vals[_np.field] = parseFloat(_np.val)||0;
  _np.field = f;
  _np.val = String(_np.vals[f]||0);
  document.getElementById('np-display').textContent = _np.val;
  npRenderUnitTabs();
  npUpdateTotal();
}
function npClose(){
  document.getElementById('np-backdrop').classList.remove('show');
  document.getElementById('numpad-wrap').classList.remove('show');
  _np.inpEl=null;
}
function npKey(k){
  var v = _np.val==='0' ? '' : _np.val;
  if(k==='C')      { _np.val='0'; }
  else if(k==='DEL'){ _np.val = v.slice(0,-1)||'0'; }
  else if(k==='.')  { if(v.indexOf('.')===-1) _np.val=(v||'0')+'.'; }
  else              { if(v.length>=7) return; _np.val = v+k; }
  document.getElementById('np-display').textContent = _np.val;
  if(_np.mode==='count'){
    _np.vals[_np.field] = parseFloat(_np.val)||0;
    npRenderUnitTabs();
    npUpdateTotal();
  }
}
function npUpdateTotal(){
  var item = items.find(function(i){return i.id===_np.itemId;});
  if(!item) return;
  var v = _np.vals;
  var s=parseFloat(v.s)||0, m=parseFloat(v.m)||0, l=parseFloat(v.l)||0, w=parseFloat(v.w)||0;
  var total=calcTotal(item,{s:s,m:m,l:l})+(item.sw>0?w/item.sw:0);
  document.getElementById('np-total').textContent=Math.round(total*100)/100;
}
function npConfirm(){
  if(_np.mode==='count'){
    _np.vals[_np.field] = parseFloat(_np.val)||0;
    var s=_np.vals.s||0, m=_np.vals.m||0, l=_np.vals.l||0, w=_np.vals.w||0;
    var item = items.find(function(i){return i.id===_np.itemId;});
    if(_np.isMonthly){
      var key=curMonthlyLoc==='現場'?'S':'W';
      counts[key+'_'+_np.itemId]={s:s,m:m,l:l,w:w};
      npClose();
      renderMonthlyLocPage();
    } else {
      counts[_np.itemId]={s:s,m:m,l:l,w:w};
      npClose();
      renderCountPage();
    }
    if(item) showToast('✓ '+item.name+'：'+calcTotal(item,{s:s,m:m,l:l})+item.sn);
  } else if(_np.cb){
    _np.cb(parseFloat(_np.val)||0);
    npClose();
  }
}

// 攔截 openNumOv 讓它改用小鍵盤
function openNumOv(itemId){
  var item=items.find(function(i){return i.id===itemId;});
  if(!item) return;
  var c=counts[itemId]||{l:0,m:0,s:0,w:0};
  var hints=[];
  if(item.mn&&item.ms>0) hints.push('1'+item.mn+'='+item.ms+item.sn);
  if(item.ln&&item.lm>0&&item.mn) hints.push('1'+item.ln+'='+item.lm+item.mn);
  if(item.wu&&item.sw>0) hints.push('1'+item.sn+'='+item.sw+item.wu);
  if(curMode!=='monthly'&&item[curMode]) hints.push('低標:'+item[curMode].min+' 補至:'+item[curMode].target);
  var fields=[];
  if(item.ln) fields.push('l');
  if(item.mn) fields.push('m');
  fields.push('s');
  if(item.wu&&item.sw>0) fields.push('w');
  npOpen({
    mode:'count', itemId:itemId, isMonthly:false,
    field:'s', val:String(c.s||0),
    fields:fields,
    vals:{l:c.l||0,m:c.m||0,s:c.s||0,w:c.w||0},
    label:item.name,
    hint:hints.join('　'), unit:item.sn
  });
}
// 攔截 openNumOvMonthly
function openNumOvMonthly(itemId){
  var item=items.find(function(i){return i.id===itemId;});
  if(!item) return;
  var key=curMonthlyLoc==='現場'?'S':'W';
  var c=counts[key+'_'+itemId]||{l:0,m:0,s:0,w:0};
  var hints=[];
  if(item.mn&&item.ms>0) hints.push('1'+item.mn+'='+item.ms+item.sn);
  if(item.ln&&item.lm>0&&item.mn) hints.push('1'+item.ln+'='+item.lm+item.mn);
  if(item.wu&&item.sw>0) hints.push('1'+item.sn+'='+item.sw+item.wu);
  var fields=[];
  if(item.ln) fields.push('l');
  if(item.mn) fields.push('m');
  fields.push('s');
  if(item.wu&&item.sw>0) fields.push('w');
  npOpen({
    mode:'count', itemId:itemId, isMonthly:true,
    field:'s', val:String(c.s||0),
    fields:fields,
    vals:{l:c.l||0,m:c.m||0,s:c.s||0,w:c.w||0},
    label:item.name+' （'+curMonthlyLoc+'）',
    hint:hints.join('　'), unit:item.sn
  });
}

// 舊的 recalc/confirmNum 保留相容
function recalc(){ npUpdateTotal&&_np.mode==='count'&&npUpdateTotal(); }
function recalcW(){ recalc(); }
function confirmNum(){} // 已被 npConfirm 取代

function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},2800);}
